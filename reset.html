<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forge Key — ALFAAZ Collective</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500&family=Teko:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-primary: #0b0d17;
      --bg-secondary: #151925;
      --text-primary: #e6eef6;
      --text-secondary: #a0aec0;
      --accent-gold: #f8d37f;
      --grid-border: rgba(230, 238, 246, 0.1);
      --transition-smooth: cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    body {
      margin: 0;
      background-color: var(--bg-primary);
      color: var(--text-primary);
      font-family: 'JetBrains Mono', monospace;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .bg-video {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      object-fit: cover; z-index: -2;
      filter: brightness(0.3) blur(4px);
    }
    .video-overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(11, 13, 23, 0.8); z-index: -1;
    }

    .auth-card {
      width: 100%;
      max-width: 400px;
      background: var(--bg-secondary);
      border: 1px solid var(--grid-border);
      padding: 3rem 2.5rem;
      position: relative;
    }
    .auth-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; width: 100%; height: 2px;
      background: var(--accent-gold);
    }

    .auth-title {
      font-family: 'Teko', sans-serif;
      font-size: 2.5rem;
      font-weight: 400;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 0.5rem;
      text-align: center;
    }
    .auth-subtitle {
      font-size: 10px;
      color: var(--text-secondary);
      letter-spacing: 1px;
      text-align: center;
      margin-bottom: 2.5rem;
      text-transform: uppercase;
    }

    .input-group { margin-bottom: 1.5rem; }
    .input-label {
      display: block;
      font-size: 9px;
      letter-spacing: 2px;
      color: var(--text-secondary);
      margin-bottom: 0.5rem;
      text-transform: uppercase;
    }

    .auth-input {
      width: 100%;
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--grid-border);
      color: var(--text-primary);
      font-family: 'JetBrains Mono', monospace;
      font-size: 14px;
      padding: 0.5rem 0;
      transition: border-color 0.3s ease;
    }
    .auth-input:focus {
      outline: none;
      border-bottom-color: var(--accent-gold);
    }

    .submit-btn {
      width: 100%;
      margin-top: 1rem;
      padding: 1rem;
      background: var(--text-primary);
      color: var(--bg-primary);
      border: 1px solid var(--text-primary);
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.3s var(--transition-smooth);
    }
    .submit-btn:hover {
      background: var(--accent-gold);
      border-color: var(--accent-gold);
    }
  </style>
</head>
<body>

  <video class="bg-video" autoplay loop muted playsinline>
    <source src="https://res.cloudinary.com/dmqwjpmjk/video/upload/v1761507594/portal-bg_oribvr.mp4" type="video/mp4">
  </video>
  <div class="video-overlay"></div>

  <div class="auth-card">
    <h1 class="auth-title">Forge Key</h1>
    <p class="auth-subtitle">Establish a new security sequence</p>

    <form id="resetForm" onsubmit="event.preventDefault();">
      <div class="input-group">
        <label class="input-label" for="newPassword">New Passkey</label>
        <input type="password" id="newPassword" class="auth-input" required>
      </div>
      
      <div class="input-group">
        <label class="input-label" for="confirmPassword">Confirm Passkey</label>
        <input type="password" id="confirmPassword" class="auth-input" required>
      </div>

      <button type="submit" class="submit-btn">Commit to Vault</button>
    </form>
  </div>

 <script>
    lucide.createIcons();

    // 1. Grab the secure token from the URL bar (e.g. ?token=xxxxx)
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token');

    // If they just navigated here without an email link, kick them to login
    if (!token) {
        window.location.href = 'login.html';
    }

    const form = document.getElementById('resetForm');
    const submitBtn = document.querySelector('.submit-btn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault(); 
      
      const newPassword = document.getElementById('newPassword').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      
      if (newPassword !== confirmPassword) {
          alert("Sequence mismatch. Passkeys must be identical.");
          return;
      }
      
      submitBtn.textContent = "Forging Key...";
      submitBtn.disabled = true;

      try {
        const response = await fetch('https://alfaaz-project.onrender.com/auth/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token: token, new_password: newPassword })
        });

        const data = await response.json();

        if (response.ok) {
          submitBtn.textContent = "Key Forged";
          submitBtn.style.background = "var(--accent-gold)";
          submitBtn.style.color = "var(--bg-primary)";
          
          alert("Passkey successfully updated. Returning to login.");
          setTimeout(() => {
             window.location.href = 'login.html';
          }, 1500);
        } else {
          submitBtn.textContent = "Commit to Vault";
          submitBtn.disabled = false;
          alert("Access Denied: " + data.detail);
        }
      } catch (error) {
        submitBtn.textContent = "Commit to Vault";
        submitBtn.disabled = false;
        alert("Cannot reach the server. Is your Python engine running?");
      }
    });
  </script>
</body>
</html>
