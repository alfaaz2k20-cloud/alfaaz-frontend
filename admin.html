<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Control Room — ALFAAZ</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500&family=Teko:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #0b0d17;
      --bg-secondary: #151925;
      --text-primary: #e6eef6;
      --text-secondary: #a0aec0;
      --accent-gold: #f8d37f;
      --accent-green: #4ade80;
      --accent-red: #f87171;
      --grid-border: rgba(230, 238, 246, 0.1);
    }
    * { box-sizing: border-box; }
    body {
      background-color: var(--bg-primary);
      color: var(--text-primary);
      font-family: 'JetBrains Mono', monospace;
      margin: 0; min-height: 100vh; padding: 2rem;
    }
    .header {
      font-family: 'Teko', sans-serif;
      font-size: 3rem;
      letter-spacing: 4px;
      color: var(--accent-gold);
      border-bottom: 1px solid var(--grid-border);
      padding-bottom: 1rem;
      margin-bottom: 0.5rem;
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      flex-wrap: wrap;
      gap: 1rem;
    }
    .tab-nav {
      display: flex;
      gap: 0;
      border-bottom: 1px solid var(--grid-border);
      margin-bottom: 2rem;
      flex-wrap: wrap;
    }
    .tab-btn {
      padding: 0.8rem 1.5rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      background: transparent;
      color: var(--text-secondary);
      border: none;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
    }
    .tab-btn:hover { color: var(--text-primary); }
    .tab-btn.active { color: var(--accent-gold); border-bottom-color: var(--accent-gold); }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }
    .section-title {
      color: var(--text-secondary);
      font-size: 11px;
      margin-top: 2rem;
      margin-bottom: 1rem;
      border-bottom: 1px dashed var(--grid-border);
      padding-bottom: 0.5rem;
      text-transform: uppercase;
      letter-spacing: 2px;
    }
    .data-card {
      background: var(--bg-secondary);
      border: 1px solid var(--grid-border);
      padding: 1.2rem 1.5rem;
      margin-bottom: 0.8rem;
      display: grid;
      gap: 1rem;
      align-items: center;
    }
    .user-card    { grid-template-columns: 2fr 1fr 1fr; }
    .inbox-card   { grid-template-columns: 2fr 1fr 1fr 1fr; }
    .club-card    { grid-template-columns: 2fr 1fr 1fr 1fr; }
    .event-card   { grid-template-columns: 2fr 1fr 1fr 1fr 1fr; }
    .label { font-size: 9px; color: var(--text-secondary); text-transform: uppercase; margin-bottom: 4px; letter-spacing: 1px; }
    .data-display { font-size: 13px; font-weight: 500; color: #fff; }
    .badge { display: inline-block; padding: 2px 8px; font-size: 9px; letter-spacing: 1px; text-transform: uppercase; }
    .badge-pending  { background: rgba(248,211,127,0.15); color: var(--accent-gold); border: 1px solid var(--accent-gold); }
    .badge-approved { background: rgba(74,222,128,0.15); color: var(--accent-green); border: 1px solid var(--accent-green); }
    .badge-rejected { background: rgba(248,113,113,0.15); color: var(--accent-red); border: 1px solid var(--accent-red); }
    .badge-open     { background: rgba(74,222,128,0.15); color: var(--accent-green); border: 1px solid var(--accent-green); }
    .badge-closed   { background: rgba(160,174,192,0.15); color: var(--text-secondary); border: 1px solid var(--text-secondary); }
    input, select, textarea {
      background: rgba(0,0,0,0.4);
      border: 1px solid var(--grid-border);
      color: var(--text-primary);
      padding: 0.5rem;
      width: 100%;
      font-family: inherit;
      font-size: 12px;
    }
    input:focus, select:focus, textarea:focus { outline: none; border-color: var(--accent-gold); }
    .btn { padding: 0.5rem 1rem; cursor: pointer; font-family: inherit; font-size: 11px; letter-spacing: 1px; text-transform: uppercase; text-align: center; text-decoration: none; display: inline-block; transition: 0.2s; border: 1px solid; }
    .btn-gold   { background: rgba(248,211,127,0.1); color: var(--accent-gold); border-color: var(--accent-gold); }
    .btn-gold:hover { background: var(--accent-gold); color: var(--bg-primary); }
    .btn-green  { background: rgba(74,222,128,0.1); color: var(--accent-green); border-color: var(--accent-green); }
    .btn-green:hover { background: var(--accent-green); color: var(--bg-primary); }
    .btn-red    { background: rgba(248,113,113,0.1); color: var(--accent-red); border-color: var(--accent-red); }
    .btn-red:hover { background: var(--accent-red); color: var(--bg-primary); }
    .btn-ghost  { background: transparent; color: var(--text-secondary); border-color: var(--grid-border); }
    .btn-ghost:hover { background: var(--text-primary); color: var(--bg-primary); }
    .btn-sm { padding: 0.3rem 0.7rem; font-size: 10px; }
    .btn-full { width: 100%; }
    .create-form { background: var(--bg-secondary); border: 1px solid var(--grid-border); padding: 1.5rem; margin-bottom: 2rem; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem; }
    .form-group { display: flex; flex-direction: column; gap: 0.3rem; }
    .form-label { font-size: 9px; color: var(--text-secondary); letter-spacing: 2px; text-transform: uppercase; }
    .empty-state { color: var(--text-secondary); font-size: 12px; padding: 2rem; text-align: center; border: 1px dashed var(--grid-border); }
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 100; align-items: center; justify-content: center; }
    .modal-overlay.open { display: flex; }
    .modal { background: var(--bg-secondary); border: 1px solid var(--accent-gold); padding: 2rem; max-width: 600px; width: 90%; max-height: 80vh; overflow-y: auto; }
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; border-bottom: 1px solid var(--grid-border); padding-bottom: 1rem; }
    @media (max-width: 768px) {
      .inbox-card, .club-card, .event-card, .user-card { grid-template-columns: 1fr; }
      .form-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <div class="header">
    <div>SYS.CONTROL_ROOM</div>
    <a href="dashboard.html" style="font-size: 1rem; color: var(--text-secondary); text-decoration: none;">&larr; Dashboard</a>
  </div>

  <div class="tab-nav">
    <button class="tab-btn active" onclick="switchTab('events')">Events</button>
    <button class="tab-btn" onclick="switchTab('clubs')">Club Applications</button>
    <button class="tab-btn" onclick="switchTab('vault')">Vault Inbox</button>
    <button class="tab-btn" onclick="switchTab('roster')">Roster</button>
  </div>

  <!-- EVENTS TAB -->
  <div id="tab-events" class="tab-panel active">
    <div class="section-title">[ Create New Event ]</div>
    <div class="create-form">
      <div class="form-grid">
        <div class="form-group">
          <label class="form-label">Event Name *</label>
          <input type="text" id="ev-name" placeholder="e.g. Absence">
        </div>
        <div class="form-group">
          <label class="form-label">Event Date</label>
          <input type="text" id="ev-date" placeholder="e.g. March 15, 2026">
        </div>
        <div class="form-group">
          <label class="form-label">Capacity (0 = unlimited)</label>
          <input type="number" id="ev-capacity" value="0" min="0">
        </div>
        <div class="form-group">
          <label class="form-label">Description</label>
          <input type="text" id="ev-desc" placeholder="Brief description...">
        </div>
      </div>
      <button class="btn btn-gold" onclick="createEvent()">+ Create Event</button>
      <span id="ev-create-msg" style="font-size:11px; margin-left:1rem; color: var(--text-secondary);"></span>
    </div>
    <div class="section-title">[ All Events ]</div>
    <div id="eventsContainer"><div class="empty-state">Loading events...</div></div>
  </div>

  <!-- CLUBS TAB -->
  <div id="tab-clubs" class="tab-panel">
    <div class="section-title">[ Club Applications ]</div>
    <div style="display:flex; gap:0.5rem; margin-bottom:1rem; flex-wrap:wrap;">
      <button class="btn btn-ghost btn-sm" onclick="filterClubs('ALL')" id="filter-ALL">All</button>
      <button class="btn btn-ghost btn-sm" onclick="filterClubs('PENDING')" id="filter-PENDING">Pending</button>
      <button class="btn btn-ghost btn-sm" onclick="filterClubs('APPROVED')" id="filter-APPROVED">Approved</button>
      <button class="btn btn-ghost btn-sm" onclick="filterClubs('REJECTED')" id="filter-REJECTED">Rejected</button>
    </div>
    <div id="clubsContainer"><div class="empty-state">Loading applications...</div></div>
  </div>

  <!-- VAULT TAB -->
  <div id="tab-vault" class="tab-panel">
    <div class="section-title">[ Vault Transmissions ]</div>
    <div id="inboxContainer"><div class="empty-state">Loading transmissions...</div></div>
  </div>

  <!-- ROSTER TAB -->
  <div id="tab-roster" class="tab-panel">
    <div class="section-title">[ Collective Roster ]</div>
    <div id="rosterContainer"><div class="empty-state">Loading roster...</div></div>
  </div>

  <!-- REGISTRATIONS MODAL -->
  <div class="modal-overlay" id="regModal">
    <div class="modal">
      <div class="modal-header">
        <div>
          <div style="font-family:'Teko',sans-serif; font-size:1.8rem; color:var(--accent-gold);" id="modalTitle">REGISTRATIONS</div>
          <div style="font-size:10px; color:var(--text-secondary);" id="modalSubtitle"></div>
        </div>
        <button class="btn btn-ghost btn-sm" onclick="closeModal()">✕ Close</button>
      </div>
      <div id="modalBody"></div>
    </div>
  </div>

  <script>
    const API_URL = "https://alfaaz-project.onrender.com";
    const token = localStorage.getItem('alfaaz_token');
    if (!token) window.location.href = 'login.html';

    const HEADERS = {
      'Content-Type': 'application/json',
      'Authorization': `Bearer ${token}`
    };

    async function apiFetch(url, options = {}) {
      const res = await fetch(url, { ...options, headers: { ...HEADERS, ...(options.headers || {}) } });
      if (res.status === 401) { window.location.href = 'login.html'; return null; }
      return res;
    }

    const userData = localStorage.getItem('alfaaz_user');
    if (!userData) window.location.href = 'login.html';
    const user = JSON.parse(userData);
    if (user.status !== 'ADMIN') {
      document.body.innerHTML = "<h1 style='color:var(--accent-red);text-align:center;margin-top:20vh;font-family:monospace;'>ACCESS DENIED</h1>";
      setTimeout(() => window.location.href = 'dashboard.html', 2000);
    }

    // ==========================================
    // TAB SWITCHING
    // ==========================================
    const tabLoaded = {};
    function switchTab(name) {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      document.querySelector(`[onclick="switchTab('${name}')"]`).classList.add('active');
      document.getElementById(`tab-${name}`).classList.add('active');
      if (!tabLoaded[name]) { tabLoaded[name] = true; loadTab(name); }
    }
    function loadTab(name) {
      if (name === 'events')  loadEvents();
      if (name === 'clubs')   loadClubs('ALL');
      if (name === 'vault')   loadVault();
      if (name === 'roster')  loadRoster();
    }
    tabLoaded['events'] = true;
    loadEvents();

    // ==========================================
    // EVENTS
    // ==========================================
    async function loadEvents() {
      const container = document.getElementById('eventsContainer');
      try {
        const res = await apiFetch(`${API_URL}/admin/events`);
        const events = await res.json();
        if (!events.length) { container.innerHTML = '<div class="empty-state">No events yet. Create one above.</div>'; return; }
        container.innerHTML = '';
        events.forEach(e => {
          const card = document.createElement('div');
          card.className = 'data-card event-card';
          const isOpen = e.registration_open;
          const capacityLabel = e.capacity === 0 ? '∞ Unlimited' : `${e.registered}/${e.capacity}`;
          card.innerHTML = `
            <div>
              <div class="label">Event</div>
              <div class="data-display">${e.name}</div>
              <div style="font-size:11px; color:var(--text-secondary); margin-top:3px;">${e.description || '—'}</div>
            </div>
            <div>
              <div class="label">Date</div>
              <div class="data-display" style="font-size:12px;">${e.event_date || '—'}</div>
            </div>
            <div>
              <div class="label">Registered</div>
              <div class="data-display">${capacityLabel}</div>
            </div>
            <div>
              <div class="label">Status</div>
              <span class="badge ${isOpen ? 'badge-open' : 'badge-closed'}">${isOpen ? 'Open' : 'Closed'}</span>
            </div>
            <div style="display:flex; flex-direction:column; gap:0.4rem;">
              <button class="btn ${isOpen ? 'btn-red' : 'btn-green'} btn-sm btn-full" onclick="toggleEvent(${e.id}, this)">
                ${isOpen ? 'Close Reg.' : 'Open Reg.'}
              </button>
              <button class="btn btn-gold btn-sm btn-full" onclick="viewRegistrations(${e.id}, '${e.name}', '${e.event_date || ''}', ${e.capacity})">
                View List
              </button>
              <button class="btn btn-red btn-sm btn-full" onclick="deleteEvent(${e.id}, '${e.name}', this)">
                Delete
              </button>
            </div>
          `;
          container.appendChild(card);
        });
      } catch (e) {
        container.innerHTML = '<div class="empty-state" style="color:var(--accent-red);">Failed to load events.</div>';
      }
    }

    async function createEvent() {
    const name = document.getElementById('ev-name').value.trim();
    const date = document.getElementById('ev-date').value.trim();
    const capacity = parseInt(document.getElementById('ev-capacity').value) || 0;
    const desc = document.getElementById('ev-desc').value.trim();
    const msg = document.getElementById('ev-create-msg');

    console.log("Attempting to create event:", { name, date, capacity, desc });

    if (!name) { 
        msg.textContent = 'Event name is required.'; 
        msg.style.color = 'var(--accent-red)'; 
        return; 
    }

    msg.textContent = 'Transmitting to Vault...';
    msg.style.color = 'var(--accent-gold)';

    try {
        const res = await apiFetch(`${API_URL}/admin/events/create`, {
            method: 'POST',
            body: JSON.stringify({ 
                name: name, 
                description: desc, 
                event_date: date, 
                capacity: capacity 
            })
        });

        const data = await res.json();
        if (res.ok) {
            msg.textContent = `✓ "${name}" online.`;
            msg.style.color = 'var(--accent-green)';
            // Clear inputs
            document.getElementById('ev-name').value = '';
            document.getElementById('ev-date').value = '';
            document.getElementById('ev-desc').value = '';
            document.getElementById('ev-capacity').value = '0';
            loadEvents(); // Refresh the list
        } else {
            msg.textContent = data.detail || 'Transmission failed.';
            msg.style.color = 'var(--accent-red)';
        }
    } catch (e) {
        console.error(e);
        msg.textContent = 'Server unreachable.';
        msg.style.color = 'var(--accent-red)';
    }
}
    async function toggleEvent(id, btn) {
      btn.textContent = '...';
      try {
        const res = await apiFetch(`${API_URL}/admin/events/${id}/toggle`, { method: 'PATCH' });
        if (res.ok) loadEvents();
      } catch (e) { btn.textContent = 'Error'; }
    }

    async function deleteEvent(id, name, btn) {
      if (!confirm(`Delete event "${name}" and all its registrations? This cannot be undone.`)) return;
      btn.textContent = '...';
      try {
        const res = await apiFetch(`${API_URL}/admin/events/${id}`, { method: 'DELETE' });
        if (res.ok) loadEvents();
      } catch (e) { btn.textContent = 'Error'; }
    }

    async function viewRegistrations(id, name, date, capacity) {
      document.getElementById('modalTitle').textContent = name.toUpperCase();
      document.getElementById('modalSubtitle').textContent = date || 'Date TBD';
      document.getElementById('modalBody').innerHTML = '<p style="color:var(--text-secondary);font-size:12px;">Loading...</p>';
      document.getElementById('regModal').classList.add('open');
      try {
        const res = await apiFetch(`${API_URL}/admin/events/${id}/registrations`);
        const data = await res.json();
        const capLabel = capacity === 0 ? 'Unlimited' : capacity;
        let html = `<div style="margin-bottom:1rem; font-size:11px; color:var(--text-secondary);">${data.total_registered} registered &nbsp;|&nbsp; Capacity: ${capLabel}</div>`;
        if (!data.registrations.length) {
          html += '<div class="empty-state">No registrations yet.</div>';
        } else {
          data.registrations.forEach((r, i) => {
            html += `<div style="padding:0.7rem; border-bottom:1px solid var(--grid-border); display:flex; justify-content:space-between; font-size:12px;">
              <span>${i + 1}. ${r.email}</span>
              <span style="color:var(--text-secondary);">${new Date(r.registered_at).toLocaleDateString()}</span>
            </div>`;
          });
        }
        document.getElementById('modalBody').innerHTML = html;
      } catch(e) {
        document.getElementById('modalBody').innerHTML = '<p style="color:var(--accent-red);">Failed to load.</p>';
      }
    }

    function closeModal() { document.getElementById('regModal').classList.remove('open'); }

    // ==========================================
    // CLUBS
    // ==========================================
    let allClubApps = [];

    async function loadClubs(filter) {
      const container = document.getElementById('clubsContainer');
      try {
        const res = await apiFetch(`${API_URL}/admin/club-applications`);
        allClubApps = await res.json();
        renderClubs(filter);
      } catch(e) {
        container.innerHTML = '<div class="empty-state" style="color:var(--accent-red);">Failed to load applications.</div>';
      }
    }

    function filterClubs(filter) {
      document.querySelectorAll('[id^="filter-"]').forEach(b => b.classList.remove('btn-gold'));
      document.getElementById(`filter-${filter}`).classList.add('btn-gold');
      renderClubs(filter);
    }

    function renderClubs(filter) {
      const container = document.getElementById('clubsContainer');
      const apps = filter === 'ALL' ? allClubApps : allClubApps.filter(a => a.status === filter);
      if (!apps.length) { container.innerHTML = '<div class="empty-state">No applications found.</div>'; return; }
      container.innerHTML = '';
      apps.forEach((a) => {
        const card = document.createElement('div');
        card.className = 'data-card club-card';
        const badgeClass = a.status === 'PENDING' ? 'badge-pending' : a.status === 'APPROVED' ? 'badge-approved' : 'badge-rejected';
        card.innerHTML = `
          <div>
            <div class="label">Applicant</div>
            <div class="data-display">${a.user_email}</div>
            ${a.note ? `<div style="font-size:11px; color:var(--text-secondary); margin-top:4px;">"${a.note}"</div>` : ''}
          </div>
          <div>
            <div class="label">Club</div>
            <div class="data-display" style="font-size:12px;">${a.club_name}</div>
            <div style="font-size:10px; color:var(--text-secondary);">${new Date(a.created_at).toLocaleDateString()}</div>
          </div>
          <div>
            <div class="label">Status</div>
            <span class="badge ${badgeClass}">${a.status}</span>
            ${a.admin_note ? `<div style="font-size:10px; color:var(--text-secondary); margin-top:4px;">${a.admin_note}</div>` : ''}
          </div>
          <div style="display:flex; flex-direction:column; gap:0.4rem;">
            ${a.status === 'PENDING' ? `
              <button class="btn btn-green btn-sm btn-full" onclick="reviewClub(${a.id}, 'APPROVED', this)">Approve</button>
              <button class="btn btn-red btn-sm btn-full" onclick="reviewClub(${a.id}, 'REJECTED', this)">Reject</button>
            ` : `<span style="font-size:10px; color:var(--text-secondary);">Reviewed</span>`}
          </div>
        `;
        container.appendChild(card);
      });
    }

    async function reviewClub(id, newStatus, btn) {
      const note = newStatus === 'REJECTED' ? prompt('Optional rejection note (or leave blank):') : null;
      btn.textContent = '...';
      try {
        const res = await apiFetch(`${API_URL}/admin/club-applications/review`, {
          method: 'POST',
          body: JSON.stringify({ application_id: id, status: newStatus, admin_note: note || null })
        });
        if (res.ok) { loadClubs('ALL'); filterClubs('ALL'); }
        else { btn.textContent = 'Error'; }
      } catch(e) { btn.textContent = 'Error'; }
    }

    // ==========================================
    // VAULT
    // ==========================================
    async function loadVault() {
      const container = document.getElementById('inboxContainer');
      try {
        const res = await apiFetch(`${API_URL}/admin/submissions`);
        const submissions = await res.json();
        if (!submissions.length) { container.innerHTML = '<div class="empty-state">The Vault is empty.</div>'; return; }
        container.innerHTML = '';
        submissions.forEach(sub => {
          const card = document.createElement('div');
          card.className = 'data-card inbox-card';
          card.innerHTML = `
            <div>
              <div class="label">Title</div>
              <div class="data-display">${sub.title}</div>
              ${sub.note ? `<div style="font-size:10px; color:var(--text-secondary); margin-top:4px;">"${sub.note}"</div>` : ''}
            </div>
            <div>
              <div class="label">Type</div>
              <div class="data-display" style="font-size:12px; color:var(--text-secondary);">${sub.submission_type}</div>
            </div>
            <div>
              <div class="label">From</div>
              <div class="data-display" style="font-size:11px; color:var(--text-secondary);">${sub.author_email}<br>${new Date(sub.created_at).toLocaleDateString()}</div>
            </div>
            <div>
              <a href="${sub.file_url}" target="_blank" class="btn btn-gold btn-full">View Artifact</a>
            </div>
          `;
          container.appendChild(card);
        });
      } catch(e) {
        container.innerHTML = '<div class="empty-state" style="color:var(--accent-red);">Signal lost.</div>';
      }
    }

    // ==========================================
    // ROSTER
    // ==========================================
    async function loadRoster() {
      const container = document.getElementById('rosterContainer');
      try {
        const res = await apiFetch(`${API_URL}/admin/users`);
        const users = await res.json();
        container.innerHTML = '';
        users.forEach((u, index) => {
          const card = document.createElement('div');
          card.className = 'data-card user-card';
          card.innerHTML = `
            <div>
              <div class="label">Identity</div>
              <div class="data-display">${u.email}</div>
            </div>
            <div>
              <div class="label">Clearance</div>
              <select id="status-${index}">
                <option value="PARTICIPANT" ${u.status === 'PARTICIPANT' ? 'selected' : ''}>Participant</option>
                <option value="ADMIN" ${u.status === 'ADMIN' ? 'selected' : ''}>Admin</option>
              </select>
            </div>
            <div>
              <button class="btn btn-gold btn-full" onclick="updateStatus('${u.email}', ${index})">Commit</button>
            </div>
          `;
          container.appendChild(card);
        });
      } catch(e) {
        container.innerHTML = '<div class="empty-state" style="color:var(--accent-red);">Error loading roster.</div>';
      }
    }

    // Single clean updateStatus with self-demotion safeguard
    async function updateStatus(email, index) {
      const statusVal = document.getElementById(`status-${index}`).value;
      const btn = document.querySelector(`#status-${index}`).parentElement.parentElement.querySelector('.btn');
      btn.textContent = 'Saving...';
      try {
        const res = await apiFetch(`${API_URL}/admin/update_status`, {
          method: 'POST',
          body: JSON.stringify({ email, status: statusVal })
        });
        if (res.ok) {
          btn.style.background = 'var(--accent-green)';
          btn.style.color = '#000';
          btn.textContent = 'Updated';
          // Self-demotion safeguard — if you just demoted yourself, clear session
          if (email === user.email && statusVal === 'PARTICIPANT') {
            localStorage.clear();
            alert("Admin clearance revoked. Returning to login.");
            setTimeout(() => window.location.href = 'login.html', 1500);
            return;
          }
          setTimeout(() => { btn.style.background = ''; btn.style.color = ''; btn.textContent = 'Commit'; }, 2000);
        } else { btn.textContent = 'Error'; }
      } catch(e) { btn.textContent = 'Error'; }
    }

    document.getElementById('regModal').addEventListener('click', function(e) {
      if (e.target === this) closeModal();
    });
  </script>
</body>
</html>
