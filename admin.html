<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Terminal — ALFAAZ</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500&family=Teko:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-primary: #0b0d17;
      --bg-secondary: #151925;
      --text-primary: #e6eef6;
      --text-secondary: #a0aec0;
      --accent-gold: #f8d37f;
      --accent-danger: #ff4a4a;
      --grid-border: rgba(230, 238, 246, 0.1);
    }

    body {
      margin: 0;
      background-color: var(--bg-primary);
      color: var(--text-primary);
      font-family: 'JetBrains Mono', monospace;
      min-height: 100vh;
    }

    /* Cinematic Background */
    .bg-video {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      object-fit: cover; z-index: -2;
      filter: brightness(0.15) blur(4px) grayscale(100%);
    }
    .video-overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(11, 13, 23, 0.9); z-index: -1;
    }

    nav {
      padding: 1.5rem 3rem;
      border-bottom: 1px solid var(--accent-gold);
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(21, 25, 37, 0.8);
    }

    .nav-title {
      font-family: 'Teko', sans-serif;
      font-size: 2rem;
      letter-spacing: 4px;
      color: var(--accent-gold);
      text-transform: uppercase;
    }

    .container {
      max-width: 1000px;
      margin: 3rem auto;
      padding: 0 2rem;
    }

    /* The Data Grid */
    .user-card {
      background: var(--bg-secondary);
      border: 1px solid var(--grid-border);
      padding: 1.5rem;
      margin-bottom: 1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: border-color 0.3s ease;
    }
    
    .user-card:hover { border-color: var(--text-secondary); }

    .user-info { display: flex; flex-direction: column; gap: 0.3rem; }
    
    .user-email { font-size: 14px; letter-spacing: 1px; }
    
    .user-status { 
      font-size: 10px; 
      letter-spacing: 2px; 
      text-transform: uppercase;
    }
    .status-pending { color: var(--text-secondary); }
    .status-active { color: var(--accent-gold); }
    .status-admin { color: var(--accent-danger); }

    /* The Action Buttons */
    .approve-btn {
      background: transparent;
      color: var(--accent-gold);
      border: 1px solid var(--accent-gold);
      padding: 0.5rem 1.5rem;
      font-family: inherit;
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .approve-btn:hover {
      background: var(--accent-gold);
      color: var(--bg-primary);
    }
    
    .return-btn {
      display: inline-block;
      margin-top: 2rem;
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    .return-btn:hover { color: var(--text-primary); }
  </style>
</head>
<body>

  <video class="bg-video" autoplay loop muted playsinline>
    <source src="assets/portal-bg_oribvr.mp4" type="video/mp4"> </video>
  <div class="video-overlay"></div>

  <nav>
    <div class="nav-title">SYS.ADMIN_OVERRIDE</div>
    <div style="font-size: 10px; letter-spacing: 2px; color: var(--accent-danger);">RESTRICTED ACCESS</div>
  </nav>

  <div class="container">
    <div style="font-size: 12px; color: var(--text-secondary); margin-bottom: 2rem; text-transform: uppercase; letter-spacing: 2px;">
      Awaiting Clearance Protocols
    </div>
    
    <div id="userGrid">
      <div style="font-size: 12px; color: var(--text-secondary);">Fetching collective data...</div>
    </div>

    <a href="dashboard.html" class="return-btn"><i data-lucide="arrow-left" class="w-3 h-3 inline"></i> Return to Dashboard</a>
  </div>

  <script>
    lucide.createIcons();

    // 1. THE BOUNCER (Security Check)
    const userData = localStorage.getItem('alfaaz_user');
    let adminEmail = "";

    if (!userData) {
      window.location.href = 'login.html';
    } else {
      const user = JSON.parse(userData);
      // If they are not an ADMIN, instantly kick them to the dashboard
      if (user.status !== "ADMIN") {
        window.location.href = 'dashboard.html';
      } else {
        adminEmail = user.email;
        fetchUsers(); // If they pass, fetch the data
      }
    }

    // 2. THE RECON (Fetch Users)
    async function fetchUsers() {
      try {
        const response = await fetch('https://alfaaz-project.onrender.com/admin/users');
        const users = await response.json();
        
        const grid = document.getElementById('userGrid');
        grid.innerHTML = ''; // Clear loading text

        users.forEach(u => {
          // Determine color based on status
          let statusClass = "status-pending";
          if (u.status === "ACTIVE_MEMBER") statusClass = "status-active";
          if (u.status === "ADMIN") statusClass = "status-admin";
          
          // Only show the Approve button if they are PENDING
          let btnHTML = '';
          if (u.status === "PENDING_CLEARANCE") {
            btnHTML = `<button onclick="approveUser('${u.email}')" class="approve-btn">Grant Clearance</button>`;
          }

          // Build the card
          const card = document.createElement('div');
          card.className = 'user-card';
          card.innerHTML = `
            <div class="user-info">
              <div class="user-email">${u.email}</div>
              <div class="user-status ${statusClass}">${u.status.replace('_', ' ')}</div>
            </div>
            <div>${btnHTML}</div>
          `;
          grid.appendChild(card);
        });

      } catch (error) {
        document.getElementById('userGrid').innerHTML = '<div style="color: red;">CRITICAL ERROR: Cannot reach mainframes.</div>';
      }
    }

    // 3. THE EXECUTION (Approve a User)
    async function approveUser(targetEmail) {
      // Find the specific button that was clicked to change its text
      const buttons = document.querySelectorAll('.approve-btn');
      
      try {
        const response = await fetch('https://alfaaz-project.onrender.com/admin/approve', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: targetEmail })
        });

        if (response.ok) {
          // Refresh the grid to show the new status
          fetchUsers();
        } else {
          alert("Override failed.");
        }
      } catch (error) {
        alert("Server communication failed.");
      }
    }
  </script>
</body>
</html>
