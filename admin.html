<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Control Room — ALFAAZ</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500&family=Teko:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #0b0d17;
      --bg-secondary: #151925;
      --text-primary: #e6eef6;
      --text-secondary: #a0aec0;
      --accent-gold: #f8d37f;
      --grid-border: rgba(230, 238, 246, 0.1);
    }
    body {
      background-color: var(--bg-primary);
      color: var(--text-primary);
      font-family: 'JetBrains Mono', monospace;
      margin: 0; min-height: 100vh; padding: 2rem;
    }
    .header {
      font-family: 'Teko', sans-serif;
      font-size: 3rem;
      letter-spacing: 4px;
      color: var(--accent-gold);
      border-bottom: 1px solid var(--grid-border);
      padding-bottom: 1rem;
      margin-bottom: 2rem;
      display: flex;
      justify-content: space-between;
      align-items: baseline;
    }
    .user-card {
      background: var(--bg-secondary);
      border: 1px solid var(--grid-border);
      padding: 1.5rem;
      margin-bottom: 1rem;
      display: grid;
      grid-template-columns: 2fr 1fr 1fr 1fr 1fr 1fr;
      gap: 1rem;
      align-items: end;
    }
    .label {
      font-size: 10px; color: var(--text-secondary); text-transform: uppercase; margin-bottom: 4px;
    }
    input, select {
      background: rgba(0,0,0,0.3);
      border: 1px solid var(--grid-border);
      color: var(--text-primary);
      padding: 0.5rem;
      width: 100%;
      font-family: inherit; font-size: 12px;
    }
    input:focus, select:focus {
      outline: none; border-color: var(--accent-gold);
    }
    .btn-save {
      background: rgba(248, 211, 127, 0.1);
      color: var(--accent-gold);
      border: 1px solid var(--accent-gold);
      padding: 0.5rem;
      cursor: pointer;
      text-transform: uppercase; font-size: 12px; letter-spacing: 1px;
      transition: 0.3s;
    }
    .btn-save:hover {
      background: var(--accent-gold); color: var(--bg-primary);
    }
    .email-display {
      font-size: 14px; font-weight: 500; color: #fff;
    }
  </style>
</head>
<body>

  <div class="header">
    <div>SYS.CONTROL_ROOM</div>
    <a href="dashboard.html" style="font-size: 1rem; color: var(--text-secondary); text-decoration: none;">&larr; Return to Dashboard</a>
  </div>

  <div id="rosterContainer">
    <p style="color: var(--text-secondary);">Decrypting Collective Roster...</p>
  </div>

  <script>
    // SECURITY CHECK: Are they an Admin?
    const userData = localStorage.getItem('alfaaz_user');
    if (!userData) window.location.href = 'login.html';
    
    const user = JSON.parse(userData);
    if (user.status !== 'ADMIN') {
      document.body.innerHTML = "<h1 style='color:red; text-align:center; margin-top:20vh;'>ACCESS DENIED. ADMIN CLEARANCE REQUIRED.</h1>";
      setTimeout(() => window.location.href = 'dashboard.html', 2000);
    }

    const API_URL = "https://alfaaz-project.onrender.com";

    // 1. Fetch all users
    async function loadRoster() {
      try {
        const response = await fetch(`${API_URL}/admin/users`);
        const users = await response.json();
        
        const container = document.getElementById('rosterContainer');
        container.innerHTML = ''; // clear loading text

        users.forEach((u, index) => {
          // Build the card for each user
          const card = document.createElement('div');
          card.className = 'user-card';
          
          card.innerHTML = `
            <div>
              <div class="label">Identity</div>
              <div class="email-display">${u.email}</div>
            </div>
            
            <div>
              <div class="label">Clearance Tier</div>
              <select id="status-${index}">
                <option value="PARTICIPANT" ${u.status === 'PARTICIPANT' ? 'selected' : ''}>Participant</option>
                <option value="MEMBER" ${u.status === 'MEMBER' ? 'selected' : ''}>Member</option>
                <option value="ADMIN" ${u.status === 'ADMIN' ? 'selected' : ''}>Admin</option>
              </select>
            </div>

            <div>
              <div class="label">Club</div>
              <select id="club-${index}">
                <option value="N/A" ${u.club === 'N/A' ? 'selected' : ''}>None</option>
                <option value="Alpha" ${u.club === 'Alpha' ? 'selected' : ''}>Alpha Club</option>
                <option value="Beta" ${u.club === 'Beta' ? 'selected' : ''}>Beta Club</option>
                <option value="Omega" ${u.club === 'Omega' ? 'selected' : ''}>Omega Club</option>
              </select>
            </div>

            <div>
              <div class="label">Exhibitions</div>
              <input type="text" id="exh-${index}" value="${u.exhibitions}">
            </div>

            <div>
              <div class="label">Credits</div>
              <input type="number" id="cred-${index}" value="${u.credits}">
            </div>

            <div>
              <button class="btn-save" onclick="saveUser('${u.email}', ${index})">Commit Edit</button>
            </div>
          `;
          container.appendChild(card);
        });
      } catch (error) {
        document.getElementById('rosterContainer').innerHTML = '<p style="color:red;">Error connecting to the vault.</p>';
      }
    }

    // 2. Save individual user updates
    async function saveUser(email, index) {
      const statusVal = document.getElementById(`status-${index}`).value;
      const clubVal = document.getElementById(`club-${index}`).value;
      const exhVal = document.getElementById(`exh-${index}`).value;
      const credVal = document.getElementById(`cred-${index}`).value;
      const btn = document.querySelector(`#status-${index}`).parentElement.parentElement.querySelector('.btn-save');

      btn.textContent = "SAVING...";

      try {
        const response = await fetch(`${API_URL}/admin/update`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email: email,
            status: statusVal,
            exhibitions: exhVal,
            club_affiliation: clubVal,
            credits: parseInt(credVal)
          })
        });

        if (response.ok) {
          btn.style.background = "#4ade80";
          btn.style.color = "#000";
          btn.textContent = "UPDATED";
          setTimeout(() => {
            btn.style.background = "rgba(248, 211, 127, 0.1)";
            btn.style.color = "var(--accent-gold)";
            btn.textContent = "Commit Edit";
          }, 2000);
        }
      } catch (error) {
        alert("System error. Edit failed.");
        btn.textContent = "Commit Edit";
      }
    }

    // Initialize
    loadRoster();
  </script>
</body>
</html>
