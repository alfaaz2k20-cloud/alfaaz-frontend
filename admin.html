<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Control Room — ALFAAZ</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500&family=Teko:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #0b0d17;
      --bg-secondary: #151925;
      --text-primary: #e6eef6;
      --text-secondary: #a0aec0;
      --accent-gold: #f8d37f;
      --grid-border: rgba(230, 238, 246, 0.1);
    }
    body {
      background-color: var(--bg-primary);
      color: var(--text-primary);
      font-family: 'JetBrains Mono', monospace;
      margin: 0; min-height: 100vh; padding: 2rem;
    }
    .header {
      font-family: 'Teko', sans-serif;
      font-size: 3rem;
      letter-spacing: 4px;
      color: var(--accent-gold);
      border-bottom: 1px solid var(--grid-border);
      padding-bottom: 1rem;
      margin-bottom: 2rem;
      display: flex;
      justify-content: space-between;
      align-items: baseline;
    }
    .section-title {
      color: var(--text-secondary);
      font-size: 1.2rem;
      margin-top: 3rem;
      margin-bottom: 1rem;
      border-bottom: 1px dashed var(--grid-border);
      padding-bottom: 0.5rem;
      text-transform: uppercase;
      letter-spacing: 2px;
    }
    .data-card {
      background: var(--bg-secondary);
      border: 1px solid var(--grid-border);
      padding: 1.5rem;
      margin-bottom: 1rem;
      display: grid;
      align-items: end;
      gap: 1rem;
    }
    .user-card {
      grid-template-columns: 2fr 1fr 1fr;
    }
    .inbox-card {
      grid-template-columns: 2fr 1fr 1fr 1fr; 
    }
    .label {
      font-size: 10px; color: var(--text-secondary); text-transform: uppercase; margin-bottom: 4px;
    }
    .data-display {
      font-size: 14px; font-weight: 500; color: #fff;
    }
    input, select {
      background: rgba(0,0,0,0.3);
      border: 1px solid var(--grid-border);
      color: var(--text-primary);
      padding: 0.5rem;
      width: 100%;
      font-family: inherit; font-size: 12px;
    }
    input:focus, select:focus {
      outline: none; border-color: var(--accent-gold);
    }
    .btn-action {
      background: rgba(248, 211, 127, 0.1);
      color: var(--accent-gold);
      border: 1px solid var(--accent-gold);
      padding: 0.5rem;
      cursor: pointer;
      text-transform: uppercase; font-size: 12px; letter-spacing: 1px;
      text-align: center;
      text-decoration: none;
      display: inline-block;
      width: 100%;
      transition: 0.3s;
    }
    .btn-action:hover {
      background: var(--accent-gold); color: var(--bg-primary);
    }
  </style>
</head>
<body>

  <div class="header">
    <div>SYS.CONTROL_ROOM</div>
    <a href="dashboard.html" style="font-size: 1rem; color: var(--text-secondary); text-decoration: none;">&larr; Return to Dashboard</a>
  </div>

  <div class="section-title">[ INBOX : VAULT TRANSMISSIONS ]</div>
  <div id="inboxContainer">
    <p style="color: var(--text-secondary);">Decrypting Transmissions...</p>
  </div>

  <div class="section-title">[ ROSTER : COLLECTIVE MEMBERS ]</div>
  <div id="rosterContainer">
    <p style="color: var(--text-secondary);">Decrypting Collective Roster...</p>
  </div>

  <script>
    // SECURITY CHECK: Ensure user is logged in
    const userData = localStorage.getItem('alfaaz_user');
    if (!userData) window.location.href = 'login.html';
    
    const user = JSON.parse(userData);
    
    // Preliminary Frontend Check (Backend will do the real check)
    if (user.status !== 'ADMIN') {
      document.body.innerHTML = "<h1 style='color:red; text-align:center; margin-top:20vh;'>ACCESS DENIED. ADMIN CLEARANCE REQUIRED.</h1>";
      setTimeout(() => window.location.href = 'dashboard.html', 2000);
    }

    const API_URL = "https://alfaaz-project.onrender.com";

    // THE VAULT KEY: Dynamically pull the logged-in email
    const ADMIN_HEADERS = {
      'Content-Type': 'application/json',
      'x-user-email': user.email 
    };

    // 1. FETCH INBOX (Submissions)
    async function loadInbox() {
      try {
        const response = await fetch(`${API_URL}/admin/submissions`, { headers: ADMIN_HEADERS });
        
        if (!response.ok) throw new Error("Vault locked.");
        
        const submissions = await response.json();
        const container = document.getElementById('inboxContainer');
        container.innerHTML = ''; 

        if (submissions.length === 0) {
            container.innerHTML = '<p style="color: var(--text-secondary);">The Vault is currently empty.</p>';
            return;
        }

        submissions.forEach(sub => {
          const card = document.createElement('div');
          card.className = 'data-card inbox-card';
          
          const date = new Date(sub.created_at).toLocaleDateString();

          card.innerHTML = `
            <div>
              <div class="label">Artifact Title</div>
              <div class="data-display">${sub.title}</div>
              ${sub.note ? `<div class="label" style="margin-top:5px; text-transform:none;">"${sub.note}"</div>` : ''}
            </div>
            <div>
              <div class="label">Type</div>
              <div class="data-display" style="color: var(--text-secondary);">${sub.submission_type}</div>
            </div>
            <div>
              <div class="label">Origin (Sender)</div>
              <div class="data-display" style="color: var(--text-secondary); font-size:12px;">${sub.author_email}<br>${date}</div>
            </div>
            <div>
              <a href="${sub.file_url}" target="_blank" class="btn-action">View Artifact</a>
            </div>
          `;
          container.appendChild(card);
        });
      } catch (error) {
        document.getElementById('inboxContainer').innerHTML = '<p style="color:red;">Signal lost or clearance denied.</p>';
      }
    }

    // 2. FETCH ROSTER (Users)
    async function loadRoster() {
      try {
        const response = await fetch(`${API_URL}/admin/users`, { headers: ADMIN_HEADERS });
        
        if (!response.ok) throw new Error("Roster locked.");
        
        const users = await response.json();
        const container = document.getElementById('rosterContainer');
        container.innerHTML = ''; 

        users.forEach((u, index) => {
          const card = document.createElement('div');
          card.className = 'data-card user-card';
          
          card.innerHTML = `
            <div>
              <div class="label">Identity</div>
              <div class="data-display">${u.email}</div>
            </div>
            <div>
              <div class="label">Clearance Tier</div>
              <select id="status-${index}">
                <option value="PARTICIPANT" ${u.status === 'PARTICIPANT' ? 'selected' : ''}>Participant</option>
                <option value="ADMIN" ${u.status === 'ADMIN' ? 'selected' : ''}>Admin</option>
              </select>
            </div>
            <div>
              <button class="btn-action" onclick="updateStatus('${u.email}', ${index})">Commit Edit</button>
            </div>
          `;
          container.appendChild(card);
        });
      } catch (error) {
        document.getElementById('rosterContainer').innerHTML = '<p style="color:red;">Error connecting to the roster.</p>';
      }
    }

    // 3. UPDATE USER STATUS
    async function updateStatus(email, index) {
      const statusVal = document.getElementById(`status-${index}`).value;
      const btn = document.querySelector(`#status-${index}`).parentElement.parentElement.querySelector('.btn-action');

      btn.textContent = "SAVING...";

      try {
        const response = await fetch(`${API_URL}/admin/update_status`, {
          method: 'POST',
          headers: ADMIN_HEADERS,
          body: JSON.stringify({ email: email, status: statusVal })
        });

        if (response.ok) {
          btn.style.background = "#4ade80";
          btn.style.color = "#000";
          btn.textContent = "UPDATED";
          
          // If you updated yourself to Participant, immediately boot you out
          if (email === user.email && statusVal === 'PARTICIPANT') {
             user.status = 'PARTICIPANT';
             localStorage.setItem('alfaaz_user', JSON.stringify(user));
             setTimeout(() => window.location.href = 'dashboard.html', 1000);
          }

          setTimeout(() => {
            btn.style.background = "rgba(248, 211, 127, 0.1)";
            btn.style.color = "var(--accent-gold)";
            btn.textContent = "Commit Edit";
          }, 2000);
        } else {
            throw new Error("Update failed");
        }
      } catch (error) {
        alert("System error. Edit failed. Insufficient clearance?");
        btn.textContent = "Commit Edit";
      }
    }

    // Initialize both sectors
    loadInbox();
    loadRoster();
  </script>
</body>
</html>
