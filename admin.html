<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Control Room — ALFAAZ</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500&family=Teko:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root { --bg-primary: #0b0d17; --bg-secondary: #151925; --text-primary: #e6eef6; --text-secondary: #a0aec0; --accent-gold: #f8d37f; --accent-green: #4ade80; --accent-red: #f87171; --grid-border: rgba(230, 238, 246, 0.1); }
    * { box-sizing: border-box; } body { background-color: var(--bg-primary); color: var(--text-primary); font-family: 'JetBrains Mono', monospace; margin: 0; min-height: 100vh; padding: 2rem; }
    .header { font-family: 'Teko', sans-serif; font-size: 3rem; letter-spacing: 4px; color: var(--accent-gold); border-bottom: 1px solid var(--grid-border); padding-bottom: 1rem; margin-bottom: 0.5rem; display: flex; justify-content: space-between; align-items: baseline; flex-wrap: wrap; gap: 1rem; }
    .tab-nav { display: flex; gap: 0; border-bottom: 1px solid var(--grid-border); margin-bottom: 2rem; flex-wrap: wrap; }
    .tab-btn { padding: 0.8rem 1.5rem; font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; background: transparent; color: var(--text-secondary); border: none; border-bottom: 2px solid transparent; transition: all 0.2s; }
    .tab-btn:hover { color: var(--text-primary); } .tab-btn.active { color: var(--accent-gold); border-bottom-color: var(--accent-gold); }
    .tab-panel { display: none; } .tab-panel.active { display: block; }
    .section-title { color: var(--text-secondary); font-size: 11px; margin-top: 2rem; margin-bottom: 1rem; border-bottom: 1px dashed var(--grid-border); padding-bottom: 0.5rem; text-transform: uppercase; letter-spacing: 2px; }
    .data-card { background: var(--bg-secondary); border: 1px solid var(--grid-border); padding: 1.2rem 1.5rem; margin-bottom: 0.8rem; display: grid; gap: 1rem; align-items: center; }
    .user-card { grid-template-columns: 2fr 1fr 1fr; } .club-card { grid-template-columns: 2fr 1fr 1fr 1fr; } .event-card { grid-template-columns: 2fr 1fr 1fr 1fr 1fr; } .exhib-card { grid-template-columns: 2fr 1.5fr 1fr 1fr; align-items: start; }
    .label { font-size: 9px; color: var(--text-secondary); text-transform: uppercase; margin-bottom: 4px; letter-spacing: 1px; } .data-display { font-size: 13px; font-weight: 500; color: #fff; }
    .badge { display: inline-block; padding: 2px 8px; font-size: 9px; letter-spacing: 1px; text-transform: uppercase; border: 1px solid;}
    .badge-pending { background: rgba(248,211,127,0.15); color: var(--accent-gold); border-color: var(--accent-gold); } .badge-approved { background: rgba(74,222,128,0.15); color: var(--accent-green); border-color: var(--accent-green); } .badge-rejected { background: rgba(248,113,113,0.15); color: var(--accent-red); border-color: var(--accent-red); } .badge-open { background: rgba(74,222,128,0.15); color: var(--accent-green); border-color: var(--accent-green); } .badge-closed { background: rgba(160,174,192,0.15); color: var(--text-secondary); border-color: var(--text-secondary); }
    input, select, textarea { background: rgba(0,0,0,0.4); border: 1px solid var(--grid-border); color: var(--text-primary); padding: 0.5rem; width: 100%; font-family: inherit; font-size: 12px; } input:focus, select:focus, textarea:focus { outline: none; border-color: var(--accent-gold); }
    .btn { padding: 0.5rem 1rem; cursor: pointer; font-family: inherit; font-size: 11px; letter-spacing: 1px; text-transform: uppercase; text-align: center; text-decoration: none; display: inline-block; transition: 0.2s; border: 1px solid; }
    .btn-gold { background: rgba(248,211,127,0.1); color: var(--accent-gold); border-color: var(--accent-gold); } .btn-gold:hover { background: var(--accent-gold); color: var(--bg-primary); } .btn-green { background: rgba(74,222,128,0.1); color: var(--accent-green); border-color: var(--accent-green); } .btn-green:hover { background: var(--accent-green); color: var(--bg-primary); } .btn-red { background: rgba(248,113,113,0.1); color: var(--accent-red); border-color: var(--accent-red); } .btn-red:hover { background: var(--accent-red); color: var(--bg-primary); } .btn-ghost { background: transparent; color: var(--text-secondary); border-color: var(--grid-border); } .btn-ghost:hover { background: var(--text-primary); color: var(--bg-primary); } .btn-sm { padding: 0.3rem 0.7rem; font-size: 10px; } .btn-full { width: 100%; }
    .create-form { background: var(--bg-secondary); border: 1px solid var(--grid-border); padding: 1.5rem; margin-bottom: 2rem; } .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem; } .form-group { display: flex; flex-direction: column; gap: 0.3rem; } .form-label { font-size: 9px; color: var(--text-secondary); letter-spacing: 2px; text-transform: uppercase; } .empty-state { color: var(--text-secondary); font-size: 12px; padding: 2rem; text-align: center; border: 1px dashed var(--grid-border); }
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 100; align-items: center; justify-content: center; } .modal-overlay.open { display: flex; } .modal { background: var(--bg-secondary); border: 1px solid var(--accent-gold); padding: 2rem; max-width: 600px; width: 90%; max-height: 80vh; overflow-y: auto; } .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; border-bottom: 1px solid var(--grid-border); padding-bottom: 1rem; }
    @media (max-width: 768px) { .club-card, .event-card, .user-card, .exhib-card { grid-template-columns: 1fr; } .form-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="header">
    <div>SYS.CONTROL_ROOM</div>
    <a href="dashboard.html" style="font-size: 1rem; color: var(--text-secondary); text-decoration: none;">&larr; Dashboard</a>
  </div>
  <div class="tab-nav">
    <button class="tab-btn active" onclick="switchTab('events')">Standard Events</button>
    <button class="tab-btn" onclick="switchTab('exhibitions')">Exhibition Engine</button>
    <button class="tab-btn" onclick="switchTab('clubs')">Club Applications</button>
    <button class="tab-btn" onclick="switchTab('roster')">System Roster</button>
  </div>

  <div id="tab-events" class="tab-panel active">
    <div class="section-title">[ Create Minor Event ]</div>
    <div class="create-form">
      <div class="form-grid">
        <div class="form-group"><label class="form-label">Event Name *</label><input type="text" id="ev-name" placeholder="e.g. Live Painting"></div>
        <div class="form-group"><label class="form-label">Event Date</label><input type="text" id="ev-date" placeholder="e.g. Sunday 4PM"></div>
        <div class="form-group"><label class="form-label">Capacity (0 = unlimited)</label><input type="number" id="ev-capacity" value="0" min="0"></div>
        <div class="form-group"><label class="form-label">Description</label><input type="text" id="ev-desc" placeholder="Brief description..."></div>
      </div>
      <button class="btn btn-gold" onclick="handleCreateEvent()">+ Create Event</button>
      <span id="ev-create-msg" style="font-size:11px; margin-left:1rem; color: var(--text-secondary);"></span>
    </div>
    <div class="section-title">[ Live Minor Events ]</div>
    <div id="eventsContainer"><div class="empty-state">Loading events...</div></div>
  </div>

  <div id="tab-exhibitions" class="tab-panel">
    <div class="section-title" style="color: var(--accent-gold);">[ MASTER EXHIBITION SETTINGS ]</div>
    <div class="create-form" style="border-color: var(--accent-gold);">
      <div class="form-grid">
        <div class="form-group"><label class="form-label">Exhibition Title</label><input type="text" id="cfg-title"></div>
        <div class="form-group"><label class="form-label">Date</label><input type="text" id="cfg-date"></div>
        <div class="form-group"><label class="form-label">Venue</label><input type="text" id="cfg-venue"></div>
        <div class="form-group"><label class="form-label">System Status</label>
          <select id="cfg-open">
            <option value="true">OPEN (Accepting Applications)</option>
            <option value="false">CLOSED (Hidden from Public)</option>
          </select>
        </div>
      </div>
      <div class="form-group" style="margin-bottom: 1.5rem;"><label class="form-label">About / Description</label><textarea id="cfg-desc" rows="3"></textarea></div>
      <button class="btn btn-gold" onclick="saveExhibConfig()">Commit Global Settings</button>
      <span id="cfg-msg" style="font-size:11px; margin-left:1rem; color: var(--accent-green);"></span>
    </div>

    <div class="section-title">[ Submitted Portfolios ]</div>
    <div style="display:flex; gap:0.5rem; margin-bottom:1rem; flex-wrap:wrap;">
      <button class="btn btn-ghost btn-sm" onclick="filterExhibitions('ALL')" id="filt-ALL">All</button>
      <button class="btn btn-ghost btn-sm" onclick="filterExhibitions('PENDING')" id="filt-PENDING">Pending</button>
      <button class="btn btn-ghost btn-sm" onclick="filterExhibitions('APPROVED')" id="filt-APPROVED">Approved</button>
      <button class="btn btn-ghost btn-sm" onclick="filterExhibitions('REJECTED')" id="filt-REJECTED">Rejected</button>
    </div>
    <div id="exhibitionsContainer"><div class="empty-state">Loading applications...</div></div>
  </div>

  <div id="tab-clubs" class="tab-panel">
    <div class="section-title">[ Club Applications ]</div>
    <div style="display:flex; gap:0.5rem; margin-bottom:1rem; flex-wrap:wrap;">
      <button class="btn btn-ghost btn-sm" onclick="filterClubs('ALL')" id="filter-ALL">All</button>
      <button class="btn btn-ghost btn-sm" onclick="filterClubs('PENDING')" id="filter-PENDING">Pending</button>
      <button class="btn btn-ghost btn-sm" onclick="filterClubs('APPROVED')" id="filter-APPROVED">Approved</button>
    </div>
    <div id="clubsContainer"><div class="empty-state">Loading applications...</div></div>
  </div>
  <div id="tab-roster" class="tab-panel">
    <div class="section-title">[ Collective Roster ]</div>
    <div id="rosterContainer"><div class="empty-state">Loading roster...</div></div>
  </div>

  <div class="modal-overlay" id="regModal">
    <div class="modal">
      <div class="modal-header">
        <div>
          <div style="font-family:'Teko',sans-serif; font-size:1.8rem; color:var(--accent-gold);" id="modalTitle">REGISTRATIONS</div>
        </div>
        <button class="btn btn-ghost btn-sm" onclick="closeModal()">✕ Close</button>
      </div>
      <div id="modalBody"></div>
    </div>
  </div>

  <script>
    const API_URL = "https://alfaaz-project.onrender.com";
    const token = localStorage.getItem('alfaaz_token'); const userData = localStorage.getItem('alfaaz_user');
    if (!token || !userData) window.location.href = 'login.html';
    const user = JSON.parse(userData); if (user.status !== 'ADMIN') window.location.href = 'dashboard.html';
    const HEADERS = { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` };
    
    async function apiFetch(url, options = {}) {
      const res = await fetch(url, { ...options, headers: { ...HEADERS, ...(options.headers || {}) } });
      if (res.status === 401 || res.status === 403) { localStorage.clear(); window.location.href = 'login.html'; return null; }
      return res;
    }

    const tabLoaded = {};
    function switchTab(name) {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      document.querySelector(`[onclick="switchTab('${name}')"]`).classList.add('active');
      document.getElementById(`tab-${name}`).classList.add('active');
      if (!tabLoaded[name]) { tabLoaded[name] = true; loadTab(name); }
    }
    function loadTab(name) {
      if (name === 'events') loadEvents(); if (name === 'exhibitions') loadExhibitions('ALL');
      if (name === 'clubs') loadClubs('ALL'); if (name === 'roster') loadRoster();
    }

    // GLOBALS FOR FIXING THE "LIST" BUG
    let allEvents = [];

    // EVENTS
    async function loadEvents() {
      const container = document.getElementById('eventsContainer');
      try {
        const res = await apiFetch(`${API_URL}/admin/events`);
        allEvents = await res.json();
        if (!allEvents.length) { container.innerHTML = '<div class="empty-state">No events found.</div>'; return; }
        container.innerHTML = '';
        allEvents.forEach(e => {
          const card = document.createElement('div'); card.className = 'data-card event-card';
          const isOpen = e.registration_open; const capLabel = e.capacity === 0 ? '∞' : `${e.registered}/${e.capacity}`;
          card.innerHTML = `
            <div><div class="label">Event</div><div class="data-display">${e.name}</div><div style="font-size:11px; color:var(--text-secondary);">${e.description || '—'}</div></div>
            <div><div class="label">Date</div><div class="data-display" style="font-size:12px;">${e.event_date || '—'}</div></div>
            <div><div class="label">Registered</div><div class="data-display">${capLabel}</div></div>
            <div><div class="label">Status</div><span class="badge ${isOpen ? 'badge-open' : 'badge-closed'}">${isOpen ? 'Open' : 'Closed'}</span></div>
            <div style="display:flex; flex-direction:column; gap:0.4rem;">
              <button class="btn ${isOpen ? 'btn-red' : 'btn-green'} btn-sm btn-full" onclick="toggleEvent(${e.id}, this)">${isOpen ? 'Close' : 'Open'}</button>
              <button class="btn btn-gold btn-sm btn-full" onclick="viewRegistrations(${e.id})">List</button>
              <button class="btn btn-red btn-sm btn-full" onclick="deleteEvent(${e.id}, '${e.name.replace(/'/g, "\\'")}', this)">Delete</button>
            </div>
          `;
          container.appendChild(card);
        });
      } catch (e) { container.innerHTML = '<div class="empty-state">Error loading events.</div>'; }
    }

    async function handleCreateEvent() {
      const name = document.getElementById('ev-name').value.trim(), date = document.getElementById('ev-date').value.trim(), capacity = parseInt(document.getElementById('ev-capacity').value) || 0, desc = document.getElementById('ev-desc').value.trim(), msg = document.getElementById('ev-create-msg');
      if (!name) return; msg.textContent = 'Creating...';
      const res = await apiFetch(`${API_URL}/admin/events/create`, { method: 'POST', body: JSON.stringify({ name, description: desc, event_date: date, capacity }) });
      if (res.ok) { msg.textContent = '✓ Created.'; loadEvents(); }
    }
    async function toggleEvent(id, btn) { btn.textContent = '...'; const res = await apiFetch(`${API_URL}/admin/events/${id}/toggle`, { method: 'PATCH' }); if (res.ok) loadEvents(); }
    async function deleteEvent(id, name, btn) { if (!confirm(`Delete ${name}?`)) return; btn.textContent = '...'; const res = await apiFetch(`${API_URL}/admin/events/${id}`, { method: 'DELETE' }); if (res.ok) loadEvents(); }
    
    // FIXED VIEW REGISTRATIONS BUG
    async function viewRegistrations(id) {
      const event = allEvents.find(e => e.id === id);
      document.getElementById('modalTitle').textContent = event.name.toUpperCase(); 
      document.getElementById('modalBody').innerHTML = 'Loading...'; document.getElementById('regModal').classList.add('open');
      const res = await apiFetch(`${API_URL}/admin/events/${id}/registrations`);
      const data = await res.json();
      let html = `<div style="font-size:11px; margin-bottom:1rem; color:var(--accent-gold);">Total Approved: ${data.registrations.length}</div>`;
      data.registrations.forEach((r, i) => {
          html += `<div style="padding:0.5rem; border-bottom:1px solid var(--grid-border); font-size:12px; display:flex; justify-content:space-between;">
                     <span>${i+1}. ${r.email}</span>
                     <span style="color:var(--text-secondary);">${r.whatsapp ? 'WA: ' + r.whatsapp : 'No WA'}</span>
                   </div>`;
      });
      document.getElementById('modalBody').innerHTML = html || 'No registrations.';
    }
    function closeModal() { document.getElementById('regModal').classList.remove('open'); }

    // EXHIBITIONS ENGINE
    let allExhibs = [];
    async function loadExhibitions(f) {
      // Load Config First
      const cfgRes = await fetch(`${API_URL}/exhibitions/config`);
      const cfg = await cfgRes.json();
      document.getElementById('cfg-title').value = cfg.title || '';
      document.getElementById('cfg-date').value = cfg.date_text || '';
      document.getElementById('cfg-venue').value = cfg.venue || '';
      document.getElementById('cfg-desc').value = cfg.about_text || '';
      document.getElementById('cfg-open').value = cfg.is_open ? "true" : "false";

      // Load Portfolios
      const res = await apiFetch(`${API_URL}/admin/exhibitions`);
      allExhibs = await res.json(); renderExhibitions(f);
    }

    async function saveExhibConfig() {
      const payload = {
        title: document.getElementById('cfg-title').value,
        date_text: document.getElementById('cfg-date').value,
        venue: document.getElementById('cfg-venue').value,
        about_text: document.getElementById('cfg-desc').value,
        is_open: document.getElementById('cfg-open').value === "true"
      };
      document.getElementById('cfg-msg').textContent = "Saving...";
      const res = await apiFetch(`${API_URL}/admin/exhibitions/config`, { method: 'POST', body: JSON.stringify(payload) });
      if (res.ok) { document.getElementById('cfg-msg').textContent = "✓ Settings Synced Globally"; setTimeout(()=> document.getElementById('cfg-msg').textContent = "", 3000); }
    }

    function filterExhibitions(f) { document.querySelectorAll('[id^="filt-"]').forEach(b => b.classList.remove('btn-gold')); document.getElementById(`filt-${f}`).classList.add('btn-gold'); renderExhibitions(f); }
    function renderExhibitions(f) {
      const container = document.getElementById('exhibitionsContainer');
      const apps = f === 'ALL' ? allExhibs : allExhibs.filter(a => a.status === f);
      container.innerHTML = '';
      if (!apps.length) { container.innerHTML = '<div class="empty-state">No portfolios submitted.</div>'; return; }
      apps.forEach(a => {
        const card = document.createElement('div'); card.className = 'data-card exhib-card';
        const badge = a.status === 'PENDING' ? 'badge-pending' : a.status === 'APPROVED' ? 'badge-approved' : 'badge-rejected';
        card.innerHTML = `
          <div><div class="label">Artist</div><div class="data-display">${a.full_name}</div><div style="font-size:10px; color:var(--text-secondary);">Age: ${a.age} | WA: ${a.whatsapp}</div><div style="font-size:10px; color:var(--text-secondary);">${a.user_email}</div></div>
          <div><div class="label">Art Profile</div><div class="data-display" style="font-size:12px;">${a.genre}</div><div style="font-size:10px; color:var(--text-secondary);">Medium: ${a.medium}</div>${a.applicant_note ? `<div style="font-size:9px; font-style:italic; color:var(--accent-gold);">"${a.applicant_note}"</div>` : ''}</div>
          <div><div class="label">Status</div><span class="badge ${badge}">${a.status}</span>${a.curator_note ? `<div style="font-size:9px; color:var(--text-secondary);">Note sent.</div>` : ''}</div>
          <div style="display:flex; flex-direction:column; gap:0.4rem;">
            <a href="${a.portfolio_url}" target="_blank" class="btn btn-ghost btn-sm btn-full" style="border-color:var(--accent-gold); color:var(--accent-gold);">View Portfolio</a>
            ${a.status === 'PENDING' ? `<button class="btn btn-green btn-sm" onclick="reviewExhibition(${a.id}, 'APPROVED', this)">Approve</button><button class="btn btn-red btn-sm" onclick="reviewExhibition(${a.id}, 'REJECTED', this)">Reject</button>` : ''}
          </div>`;
        container.appendChild(card);
      });
    }
    async function reviewExhibition(id, status, btn) {
      let paymentLink = null; if (status === 'APPROVED') { paymentLink = prompt("Enter the secure payment/registration link to email to the artist:"); if (!paymentLink) return; }
      const note = prompt('Optional Curator Note (this will be shown on their dashboard):'); btn.textContent = '...';
      const res = await apiFetch(`${API_URL}/admin/exhibitions/review`, { method: 'POST', body: JSON.stringify({ application_id: id, status: status, curator_note: note, payment_link: paymentLink }) });
      if (res.ok) { loadExhibitions('ALL'); filterExhibitions('ALL'); }
    }

    // CLUBS
    let allClubApps = [];
    async function loadClubs(f) { const res = await apiFetch(`${API_URL}/admin/club-applications`); allClubApps = await res.json(); renderClubs(f); }
    function filterClubs(f) { document.querySelectorAll('[id^="filter-"]').forEach(b => b.classList.remove('btn-gold')); document.getElementById(`filter-${f}`).classList.add('btn-gold'); renderClubs(f); }
    function renderClubs(f) {
      const container = document.getElementById('clubsContainer'); const apps = f === 'ALL' ? allClubApps : allClubApps.filter(a => a.status === f); container.innerHTML = '';
      if (!apps.length) { container.innerHTML = '<div class="empty-state">No apps found.</div>'; return; }
      apps.forEach(a => {
        const card = document.createElement('div'); card.className = 'data-card club-card'; const badge = a.status === 'PENDING' ? 'badge-pending' : a.status === 'APPROVED' ? 'badge-approved' : 'badge-rejected';
        card.innerHTML = `<div><div class="label">User</div><div class="data-display">${a.user_email}</div></div><div><div class="label">Club</div><div class="data-display">${a.club_name}</div></div><div><div class="label">Status</div><span class="badge ${badge}">${a.status}</span></div><div style="display:flex; flex-direction:column; gap:0.4rem;">${a.status === 'PENDING' ? `<button class="btn btn-green btn-sm" onclick="reviewClub(${a.id}, 'APPROVED', this)">Approve</button><button class="btn btn-red btn-sm" onclick="reviewClub(${a.id}, 'REJECTED', this)">Reject</button>` : '<span style="font-size:10px;">Reviewed</span>'}</div>`;
        container.appendChild(card);
      });
    }
    async function reviewClub(id, status, btn) { const note = status === 'REJECTED' ? prompt('Note:') : null; btn.textContent = '...'; const res = await apiFetch(`${API_URL}/admin/club-applications/review`, { method: 'POST', body: JSON.stringify({ application_id: id, status, admin_note: note }) }); if (res.ok) loadClubs('ALL'); }

    // ROSTER
    async function loadRoster() {
      const container = document.getElementById('rosterContainer'); const res = await apiFetch(`${API_URL}/admin/users`); const users = await res.json(); container.innerHTML = '';
      users.forEach((u, i) => {
        const card = document.createElement('div'); card.className = 'data-card user-card';
        card.innerHTML = `<div><div class="label">User</div><div class="data-display">${u.email}</div></div><div><select id="st-${i}"><option value="PARTICIPANT" ${u.status==='PARTICIPANT'?'selected':''}>Participant</option><option value="ADMIN" ${u.status==='ADMIN'?'selected':''}>Admin</option></select></div><button class="btn btn-gold btn-sm" onclick="updateStatus('${u.email}', ${i}, this)">Commit</button>`;
        container.appendChild(card);
      });
    }
    async function updateStatus(email, i, btn) { const status = document.getElementById(`st-${i}`).value; btn.textContent = '...'; const res = await apiFetch(`${API_URL}/admin/update_status`, { method: 'POST', body: JSON.stringify({ email, status }) }); if (res.ok) { if (email === user.email && status === 'PARTICIPANT') { localStorage.clear(); window.location.href = 'login.html'; } btn.textContent = '✓'; setTimeout(() => btn.textContent = 'Commit', 2000); } }

    switchTab('events'); 
  </script>
</body>
</html>
