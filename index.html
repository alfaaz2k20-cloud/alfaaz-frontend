<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ALFAAZ — Art • Literature • Culture</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500&family=Teko:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-primary: #0b0d17;
      --bg-secondary: #151925;
      --text-primary: #e6eef6;
      --text-secondary: #a0aec0;
      --accent-gold: #f8d37f;
      --grid-border: rgba(230, 238, 246, 0.1);
    }

    body {
      margin: 0;
      background-color: var(--bg-primary);
      color: var(--text-primary);
      font-family: 'JetBrains Mono', monospace;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Hero Background */
    .hero-video {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      object-fit: cover; z-index: -2;
      filter: brightness(0.3) contrast(1.1);
    }
    .hero-overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: radial-gradient(circle, transparent 20%, var(--bg-primary) 100%);
      z-index: -1;
    }

    /* Navigation */
    nav {
      padding: 1.5rem 3rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--grid-border);
      backdrop-filter: blur(8px);
      position: sticky; top: 0; z-index: 50;
    }
    .logo {
      font-family: 'Teko', sans-serif;
      font-size: 2.2rem;
      letter-spacing: 5px;
      text-transform: uppercase;
      color: var(--text-primary);
      text-decoration: none;
    }

    /* Hero Text */
    .hero-content {
      padding: 8rem 3rem 4rem 3rem;
      max-width: 900px;
    }
    .hero-title {
      font-family: 'Teko', sans-serif;
      font-size: clamp(4rem, 12vw, 8rem);
      line-height: 0.9;
      letter-spacing: -2px;
      margin-bottom: 1rem;
      text-transform: uppercase;
    }
    .hero-tagline {
      font-size: 14px;
      letter-spacing: 4px;
      color: var(--accent-gold);
      text-transform: uppercase;
      margin-bottom: 2rem;
    }

    /* Dynamic Notice Board */
    .notices-section {
      border: 1px solid var(--grid-border);
      background: rgba(21, 25, 37, 0.6);
      backdrop-filter: blur(10px);
      padding: 2.5rem;
      max-width: 500px;
      margin-left: 3rem;
      position: relative;
    }
    .notices-section::before {
      content: 'VAULT_TRANSMISSIONS';
      position: absolute;
      top: -10px; left: 20px;
      background: var(--accent-gold);
      color: var(--bg-primary);
      padding: 0 10px;
      font-size: 9px;
      letter-spacing: 2px;
    }

    /* Buttons */
    .btn-portal {
      display: inline-block;
      border: 1px solid var(--accent-gold);
      padding: 1rem 2.5rem;
      color: var(--accent-gold);
      text-transform: uppercase;
      font-size: 11px;
      letter-spacing: 3px;
      transition: all 0.3s;
      text-decoration: none;
      margin-top: 2rem;
    }
    .btn-portal:hover {
      background: var(--accent-gold);
      color: var(--bg-primary);
    }

    .notice-item {
      border-bottom: 1px dashed var(--grid-border);
      padding-bottom: 1.5rem;
      margin-bottom: 1.5rem;
    }
    .notice-item:last-child { border: none; margin-bottom: 0; padding-bottom: 0; }

    @media (max-width: 768px) {
      nav { padding: 1rem 1.5rem; }
      .hero-content { padding: 4rem 1.5rem; }
      .notices-section { margin-left: 1.5rem; margin-right: 1.5rem; }
    }
  </style>
</head>
<body>

  <video class="hero-video" autoplay loop muted playsinline>
    <source src="https://res.cloudinary.com/dmqwjpmjk/video/upload/v1761507594/portal-bg_oribvr.mp4" type="video/mp4">
  </video>
  <div class="hero-overlay"></div>

  <nav>
    <a href="#" class="logo">ALFAAZ</a>
    <div class="flex gap-8 items-center">
      <a href="login.html" class="text-[10px] uppercase tracking-[3px] text-secondary hover:text-white transition">Initialize Session</a>
      <a href="register.html" class="text-[10px] uppercase tracking-[3px] py-2 px-4 border border-white/20 hover:border-white transition">Enlist</a>
    </div>
  </nav>

  <main>
    <div class="hero-content">
      <p class="hero-tagline">Art • Literature • Culture</p>
      <h1 class="hero-title">Where creativity <br>meets the void.</h1>
      <p class="text-secondary max-w-md mt-6 leading-relaxed">
        A curated collective for those who find meaning in the abstract. 
        Join the roster to access private exhibitions and secure your place in the clubs.
      </p>
      <a href="login.html" class="btn-portal">Join a Club</a>
    </div>

    <div class="notices-section" id="notices-anchor">
      <div id="live-notices">
        <p class="text-[11px] text-secondary animate-pulse uppercase tracking-[2px]">Scanning for active transmissions...</p>
      </div>
    </div>
  </main>

  <script>
    lucide.createIcons();

    // DYNAMIC NOTICES ENGINE
    async function loadPublicNotices() {
        const container = document.getElementById('live-notices');
        const API_URL = "https://alfaaz-project.onrender.com";

        try {
            // Hit the PUBLIC active events endpoint
            const res = await fetch(`${API_URL}/events/active`);
            const events = await res.json();
            
            if (!events.length) {
                container.innerHTML = `
                    <div class="notice-item">
                        <div class="text-[10px] text-secondary tracking-widest uppercase">System Status</div>
                        <div class="font-bold text-white text-lg font-['Teko'] tracking-wider">THE VAULT IS QUIET</div>
                        <p class="text-[11px] text-secondary mt-1">No active registrations at this cycle. Monitor Instagram for live signals.</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = events.map(e => `
                <div class="notice-item">
                    <div class="flex justify-between items-start mb-1">
                        <div class="text-[9px] text-accent-gold tracking-[2px] uppercase">${e.event_date || 'Date TBD'}</div>
                        ${e.full ? 
                           '<span class="text-[8px] border border-red-500/50 text-red-400 px-1 uppercase">Capacity Reached</span>' : 
                           `<span class="text-[8px] border border-green-500/50 text-green-400 px-1 uppercase">${e.spots_left} Spots Left</span>`
                        }
                    </div>
                    <div class="font-bold text-white text-2xl font-['Teko'] tracking-wider leading-none uppercase">${e.name}</div>
                    <p class="text-[11px] text-secondary mt-2 line-clamp-2">${e.description || ''}</p>
                    <a href="login.html" class="text-[9px] text-accent-gold underline mt-3 block uppercase tracking-widest hover:text-white transition">
                       Secure Clearance &rarr;
                    </a>
                </div>
            `).join('');

        } catch (err) {
            container.innerHTML = `
                <div class="text-red-400 text-[10px] uppercase tracking-widest">
                   [ Transmission Interrupted: Check Connection ]
                </div>
            `;
        }
    }

    // Run the scan
    loadPublicNotices();
  </script>
</body>
</html>
