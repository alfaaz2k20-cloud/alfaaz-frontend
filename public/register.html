<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Request Access — ALFAAZ</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500&family=Teko:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-primary: #0b0d17;
      --bg-secondary: #151925;
      --text-primary: #e6eef6;
      --text-secondary: #a0aec0;
      --accent-gold: #f8d37f;
      --grid-border: rgba(230, 238, 246, 0.1);
      --accent-red: #ff5555;
      --accent-green: #4ade80;
      --transition-smooth: cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    body {
      margin: 0;
      background-color: var(--bg-primary);
      color: var(--text-primary);
      font-family: 'JetBrains Mono', monospace;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Background Setup */
    .bg-video {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      object-fit: cover; z-index: -2;
      filter: brightness(0.3) blur(4px);
    }
    .video-overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(11, 13, 23, 0.8); z-index: -1;
    }

    /* Back Button */
    .back-btn {
      position: fixed;
      top: 2rem; left: 2rem;
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      transition: color 0.3s ease;
    }
    .back-btn:hover { color: var(--accent-gold); }

    /* Login Card - Brutalist Window */
    .auth-card {
      width: 100%;
      max-width: 400px;
      background: var(--bg-secondary);
      border: 1px solid var(--grid-border);
      padding: 3rem 2.5rem;
      position: relative;
    }

    .auth-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; width: 100%; height: 2px;
      background: var(--accent-gold);
    }

    .auth-title {
      font-family: 'Teko', sans-serif;
      font-size: 2.5rem;
      font-weight: 400;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 0.5rem;
      text-align: center;
    }

    .auth-subtitle {
      font-size: 10px;
      color: var(--text-secondary);
      letter-spacing: 1px;
      text-align: center;
      margin-bottom: 2.5rem;
      text-transform: uppercase;
    }

    .input-group { margin-bottom: 1.5rem; }

    .input-label {
      display: block;
      font-size: 9px;
      letter-spacing: 2px;
      color: var(--text-secondary);
      margin-bottom: 0.5rem;
      text-transform: uppercase;
    }

    .auth-input {
      width: 100%;
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--grid-border);
      color: var(--text-primary);
      font-family: 'JetBrains Mono', monospace;
      font-size: 14px;
      padding: 0.5rem 0;
      transition: border-color 0.3s ease;
    }

    .auth-input:focus {
      outline: none;
      border-bottom-color: var(--accent-gold);
    }

    /* Password strength meter */
    .strength-bar-wrap {
      margin-top: 8px;
      height: 2px;
      background: var(--grid-border);
      position: relative;
    }
    .strength-bar {
      height: 100%;
      width: 0%;
      transition: width 0.4s ease, background 0.4s ease;
    }
    .strength-label {
      font-size: 8px;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-top: 4px;
      color: var(--text-secondary);
      min-height: 12px;
    }

    /* Match indicator on confirm field */
    .match-indicator {
      font-size: 8px;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-top: 4px;
      min-height: 12px;
    }

    .submit-btn {
      width: 100%;
      margin-top: 1rem;
      padding: 1rem;
      background: var(--text-primary);
      color: var(--bg-primary);
      border: 1px solid var(--text-primary);
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.3s var(--transition-smooth);
    }

    .submit-btn:hover {
      background: var(--accent-gold);
      border-color: var(--accent-gold);
    }

    .toggle-auth {
      margin-top: 1.5rem;
      text-align: center;
      font-size: 9px;
      color: var(--text-secondary);
      letter-spacing: 1px;
    }
    .toggle-auth a {
      color: var(--text-primary);
      text-decoration: underline;
      margin-left: 0.5rem;
      transition: color 0.3s ease;
    }
    .toggle-auth a:hover { color: var(--accent-gold); }
  </style>
</head>
<body>

  <video class="bg-video" autoplay loop muted playsinline>
    <source src="https://res.cloudinary.com/dmqwjpmjk/video/upload/v1761507594/portal-bg_oribvr.mp4" type="video/mp4">
  </video>
  <div class="video-overlay"></div>

  <a href="index.html" class="back-btn">
    <i data-lucide="arrow-left" class="w-4 h-4"></i> Abort
  </a>

  <div class="auth-card">
    <h1 class="auth-title">Enlist</h1>
    <p class="auth-subtitle">Establish new credentials</p>

    <form id="registerForm">
      <div class="input-group">
        <label class="input-label" for="regName">Display Name <span style="color:var(--grid-border)">(optional)</span></label>
        <input type="text" id="regName" class="auth-input" autocomplete="name" spellcheck="false" placeholder="e.g. Agha Shahid">
      </div>

      <div class="input-group">
        <label class="input-label" for="regEmail">Email Sequence</label>
        <input type="email" id="regEmail" class="auth-input" required autocomplete="email" spellcheck="false">
      </div>
      
      <div class="input-group">
        <label class="input-label" for="regPassword">Create Passkey</label>
        <input type="password" id="regPassword" class="auth-input" required autocomplete="new-password">
        <div class="strength-bar-wrap"><div class="strength-bar" id="strengthBar"></div></div>
        <div class="strength-label" id="strengthLabel"></div>
      </div>

      <div class="input-group">
        <label class="input-label" for="regConfirm">Confirm Passkey</label>
        <input type="password" id="regConfirm" class="auth-input" required autocomplete="new-password">
        <div class="match-indicator" id="matchIndicator"></div>
      </div>

      <button type="submit" class="submit-btn">Request Clearance</button>
    </form>

    <div class="toggle-auth">
      Already in the collective? <a href="login.html">Initialize Session</a>
    </div>
  </div>

 <script>
    lucide.createIcons();

    const form = document.getElementById('registerForm');
    const submitBtn = document.querySelector('.submit-btn');
    const passwordInput = document.getElementById('regPassword');
    const confirmInput = document.getElementById('regConfirm');
    const strengthBar = document.getElementById('strengthBar');
    const strengthLabel = document.getElementById('strengthLabel');
    const matchIndicator = document.getElementById('matchIndicator');

    // --- PASSWORD STRENGTH METER ---
    function getStrength(pw) {
      let score = 0;
      if (pw.length >= 8) score++;
      if (pw.length >= 12) score++;
      if (/[A-Z]/.test(pw)) score++;
      if (/[0-9]/.test(pw)) score++;
      if (/[^A-Za-z0-9]/.test(pw)) score++;
      return score;
    }

    const strengthLevels = [
      { label: '',              color: 'transparent',    pct: '0%'   },
      { label: 'WEAK',         color: 'var(--accent-red)',   pct: '20%'  },
      { label: 'WEAK',         color: 'var(--accent-red)',   pct: '35%'  },
      { label: 'MODERATE',     color: 'var(--accent-gold)',  pct: '60%'  },
      { label: 'STRONG',       color: 'var(--accent-green)', pct: '80%'  },
      { label: 'UNBREACHABLE', color: 'var(--accent-green)', pct: '100%' },
    ];

    passwordInput.addEventListener('input', () => {
      const pw = passwordInput.value;
      const score = pw.length === 0 ? 0 : Math.max(1, getStrength(pw));
      const level = strengthLevels[score];
      strengthBar.style.width = level.pct;
      strengthBar.style.background = level.color;
      strengthLabel.textContent = level.label;
      strengthLabel.style.color = level.color;
      checkMatch();
    });

    // --- CONFIRM MATCH INDICATOR ---
    function checkMatch() {
      const pw = passwordInput.value;
      const cf = confirmInput.value;
      if (!cf) { matchIndicator.textContent = ''; return; }
      if (pw === cf) {
        matchIndicator.textContent = '✓ Sequences Match';
        matchIndicator.style.color = 'var(--accent-green)';
      } else {
        matchIndicator.textContent = '✗ Mismatch Detected';
        matchIndicator.style.color = 'var(--accent-red)';
      }
    }
    confirmInput.addEventListener('input', checkMatch);

    // --- FORM SUBMIT ---
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const emailValue = document.getElementById('regEmail').value.trim();
      const nameValue  = document.getElementById('regName').value.trim();
      const passwordValue = passwordInput.value;
      const confirmValue  = confirmInput.value;

      if (passwordValue.length < 8) {
        matchIndicator.textContent = '✗ Passkey must be at least 8 characters.';
        matchIndicator.style.color = 'var(--accent-red)';
        return;
      }

      if (passwordValue !== confirmValue) {
        matchIndicator.textContent = '✗ Passkeys must match before proceeding.';
        matchIndicator.style.color = 'var(--accent-red)';
        confirmInput.focus();
        return;
      }
      
      submitBtn.textContent = "Transmitting...";
      submitBtn.disabled = true;

      try {
        const response = await fetch('https://alfaaz-project.onrender.com/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: emailValue, password: passwordValue, full_name: nameValue || null })
        });

        const data = await response.json();

        if (response.ok) {
          submitBtn.textContent = "Clearance Granted";
          submitBtn.style.background = "var(--accent-gold)";
          submitBtn.style.color = "var(--bg-primary)";
          
          localStorage.setItem('alfaaz_user', JSON.stringify(data.user));
          localStorage.setItem('alfaaz_token', data.token);
          
          setTimeout(() => { window.location.href = 'dashboard.html'; }, 1000);

        } else {
          submitBtn.textContent = "Request Clearance";
          submitBtn.disabled = false;
          const msg = data.detail?.[0]?.msg || data.detail || "Registration failed.";
          alert("Registration Failed: " + msg);
        }

      } catch (error) {
        submitBtn.textContent = "Request Clearance";
        submitBtn.disabled = false;
        alert("Cannot reach the server. Is your Python engine running?");
      }
    });
  </script>
  <script src="api.js"></script>
</body>
</html>
