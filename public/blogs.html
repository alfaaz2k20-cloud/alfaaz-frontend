<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Archives | Alfaaz Collective</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500&family=Teko:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest" defer></script>

  <style>
    :root {
      --bg-primary: #0b0d17;
      --bg-secondary: #151925;
      --text-primary: #e6eef6;
      --text-secondary: #a0aec0;
      --accent-gold: #f8d37f;
      --accent-gold-dim: rgba(248, 211, 127, 0.1);
      --grid-border: rgba(230, 238, 246, 0.1);
      --cursor-size: 12px;
      --cursor-hover-size: 80px;
      --transition-smooth: cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      background-color: var(--bg-primary);
      color: var(--text-primary);
      font-family: 'Inter', system-ui, sans-serif;
      overflow-x: hidden;
      cursor: none;
    }

    /* Background Textures */
    .bg-placeholder { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -3; background: linear-gradient(135deg, #0b0d17 0%, #151925 50%, #1a1f35 100%); }
    .texture-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; opacity: 0.3; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E"); pointer-events: none; }

    /* Custom Cursor */
    .custom-cursor { position: fixed; top: 0; left: 0; width: var(--cursor-size); height: var(--cursor-size); background: var(--accent-gold); border-radius: 50%; pointer-events: none; z-index: 10000; transform: translate(-50%, -50%); transition: width 0.3s ease, height 0.3s ease, background 0.3s ease, border 0.3s ease; }
    .custom-cursor.hover { width: var(--cursor-hover-size); height: var(--cursor-hover-size); background: transparent; border: 1px solid var(--accent-gold); display: flex; align-items: center; justify-content: center; font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 3px; color: var(--accent-gold); }
    .custom-cursor.hover::after { content: 'READ'; }

    /* Brutalist Nav */
    nav { position: fixed; top: 0; left: 0; width: 100%; padding: 1.5rem 3rem; display: flex; justify-content: space-between; align-items: center; z-index: 1000; background: rgba(11, 13, 23, 0.85); backdrop-filter: blur(16px); border-bottom: 1px solid var(--grid-border); }
    .logo { font-family: 'Teko', sans-serif; font-size: 1.8rem; font-weight: 500; letter-spacing: 4px; text-transform: uppercase; color: var(--text-primary); text-decoration: none; }
    .nav-cta { font-family: 'JetBrains Mono', monospace; font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: var(--bg-primary); background: var(--accent-gold); padding: 0.6rem 1.2rem; text-decoration: none; transition: all 0.3s var(--transition-smooth); }
    .nav-cta:hover { background: transparent; color: var(--accent-gold); border: 1px solid var(--accent-gold); }

    /* Main Archive Grid */
    main { max-width: 900px; margin: 8rem auto 4rem; padding: 0 2rem; min-height: 60vh; }
    .page-title { font-family: 'Teko', sans-serif; font-size: clamp(3rem, 8vw, 5rem); font-weight: 300; text-transform: uppercase; letter-spacing: 2px; color: var(--text-primary); margin-bottom: 0.5rem; line-height: 1; }
    .page-subtitle { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--accent-gold); text-transform: uppercase; letter-spacing: 4px; margin-bottom: 4rem; display: block; border-bottom: 1px solid var(--grid-border); padding-bottom: 2rem; }

    .archive-grid { display: flex; flex-direction: column; gap: 1rem; }
    .archive-card { background: var(--bg-secondary); padding: 2.5rem; position: relative; overflow: hidden; transition: all 0.4s var(--transition-smooth); border: 1px solid var(--grid-border); text-decoration: none; display: block; cursor: none; }
    .archive-card::before { content: ''; position: absolute; top: 0; left: 0; width: 3px; height: 100%; background: var(--accent-gold); transform: scaleY(0); transform-origin: top; transition: transform 0.4s var(--transition-smooth); }
    .archive-card:hover::before { transform: scaleY(1); }
    .archive-card:hover { background: var(--accent-gold-dim); }

    .archive-meta { font-family: 'JetBrains Mono', monospace; font-size: 9px; letter-spacing: 3px; text-transform: uppercase; color: var(--accent-gold); margin-bottom: 1rem; }
    .archive-title { font-family: 'Teko', sans-serif; font-size: 2.2rem; font-weight: 300; text-transform: uppercase; letter-spacing: 1px; color: var(--text-primary); line-height: 1.2; margin-bottom: 1rem; }
    .archive-excerpt { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-secondary); line-height: 1.6; }

    .loading-state { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-secondary); text-align: center; padding: 4rem; text-transform: uppercase; letter-spacing: 3px; border: 1px dashed var(--grid-border); }

    footer { text-align: center; padding: 2em 0; border-top: 1px solid var(--grid-border); font-family: 'JetBrains Mono', monospace; font-size: 9px; color: var(--text-secondary); letter-spacing: 2px; text-transform: uppercase; }
  </style>
</head>
<body>

  <div class="bg-placeholder"></div>
  <div class="texture-overlay"></div>
  <div class="custom-cursor" id="cursor"></div>

  <nav>
    <a href="index.html" class="logo magnetic">ALFAAZ</a>
    <a href="index.html" class="nav-cta magnetic">Return to Base</a>
  </nav>

  <main>
    <h1 class="page-title">The Archives</h1>
    <span class="page-subtitle">Compiled Transmissions</span>

    <div id="blogContainer" class="archive-grid">
      <div class="loading-state">Establishing link to the vault...</div>
    </div>
  </main>

  <footer>
    <p>System Online // The Phantom AI</p>
  </footer>

  <script>
    // Cursor Logic
    const cursor = document.getElementById('cursor');
    let mouseX = 0, mouseY = 0, cursorX = 0, cursorY = 0;
    document.addEventListener('mousemove', (e) => { mouseX = e.clientX; mouseY = e.clientY; });
    function animateCursor() {
      cursorX += (mouseX - cursorX) * 0.15;
      cursorY += (mouseY - cursorY) * 0.15;
      cursor.style.left = cursorX + 'px';
      cursor.style.top = cursorY + 'px';
      requestAnimationFrame(animateCursor);
    }
    animateCursor();

    function attachHoverEffects() {
      document.querySelectorAll('.archive-card, .magnetic').forEach(el => {
        el.addEventListener('mouseenter', () => cursor.classList.add('hover'));
        el.addEventListener('mouseleave', () => cursor.classList.remove('hover'));
      });
    }

    // Database Fetch Logic (Untouched!)
    async function loadBlogs() {
      const container = document.getElementById('blogContainer');
      try {
        const res = await fetch('/api/blogs');
        if (!res.ok) throw new Error('Network response was not ok');
        const blogs = await res.json();
        
        if (!blogs.length) {
          container.innerHTML = '<div class="loading-state">The archives are currently empty.</div>';
          return;
        }

        container.innerHTML = blogs.map(blog => `
          <a href="post.html?id=${blog.id}" class="archive-card">
            <div class="archive-meta">${new Date(blog.created_at).toLocaleDateString('en-US', { year: 'numeric', month: '2-digit', day: '2-digit' }).replace(/\//g, '.')} // Phantom Thread</div>
            <h2 class="archive-title">${blog.title}</h2>
            <p class="archive-excerpt">${blog.excerpt}</p>
          </a>
        `).join('');
        
        attachHoverEffects();
      } catch (error) {
        console.error("Failed to fetch blogs:", error);
        container.innerHTML = '<div class="loading-state" style="color: var(--accent-gold);">[ERROR] Signal Intercepted.</div>';
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      loadBlogs();
      attachHoverEffects();
    });
  </script>
</body>
</html>
