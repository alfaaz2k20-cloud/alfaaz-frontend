<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forge Key — ALFAAZ Collective</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500&family=Teko:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-primary: #0b0d17;
      --bg-secondary: #151925;
      --text-primary: #e6eef6;
      --text-secondary: #a0aec0;
      --accent-gold: #f8d37f;
      --grid-border: rgba(230, 238, 246, 0.1);
      --accent-red: #ff5555;
      --accent-green: #4ade80;
      --transition-smooth: cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    body {
      margin: 0;
      background-color: var(--bg-primary);
      color: var(--text-primary);
      font-family: 'JetBrains Mono', monospace;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .bg-video {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      object-fit: cover; z-index: -2;
      filter: brightness(0.3) blur(4px);
    }
    .video-overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(11, 13, 23, 0.8); z-index: -1;
    }

    .auth-card {
      width: 100%;
      max-width: 400px;
      background: var(--bg-secondary);
      border: 1px solid var(--grid-border);
      padding: 3rem 2.5rem;
      position: relative;
    }
    .auth-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; width: 100%; height: 2px;
      background: var(--accent-gold);
    }

    .auth-title {
      font-family: 'Teko', sans-serif;
      font-size: 2.5rem;
      font-weight: 400;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 0.5rem;
      text-align: center;
    }
    .auth-subtitle {
      font-size: 10px;
      color: var(--text-secondary);
      letter-spacing: 1px;
      text-align: center;
      margin-bottom: 2.5rem;
      text-transform: uppercase;
    }

    .input-group { margin-bottom: 1.5rem; }
    .input-label {
      display: block;
      font-size: 9px;
      letter-spacing: 2px;
      color: var(--text-secondary);
      margin-bottom: 0.5rem;
      text-transform: uppercase;
    }

    .auth-input {
      width: 100%;
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--grid-border);
      color: var(--text-primary);
      font-family: 'JetBrains Mono', monospace;
      font-size: 14px;
      padding: 0.5rem 0;
      transition: border-color 0.3s ease;
    }
    .auth-input:focus {
      outline: none;
      border-bottom-color: var(--accent-gold);
    }

    .submit-btn {
      width: 100%;
      margin-top: 1rem;
      padding: 1rem;
      background: var(--text-primary);
      color: var(--bg-primary);
      border: 1px solid var(--text-primary);
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.3s var(--transition-smooth);
    }
    .submit-btn:hover {
      background: var(--accent-gold);
      border-color: var(--accent-gold);
    }

    .password-wrap { position: relative; }
    .password-wrap .auth-input { padding-right: 2.5rem; }
    .toggle-pw {
      position: absolute; right: 0; bottom: 0.5rem;
      background: none; border: none; color: var(--text-secondary);
      cursor: pointer; font-family: 'JetBrains Mono', monospace;
      font-size: 9px; letter-spacing: 1px; text-transform: uppercase;
      padding: 0; transition: color 0.3s ease;
    }
    .toggle-pw:hover { color: var(--accent-gold); }

    .strength-bar-wrap { margin-top: 8px; height: 2px; background: var(--grid-border); }
    .strength-bar { height: 100%; width: 0%; transition: width 0.4s ease, background 0.4s ease; }
    .strength-label { font-size: 8px; letter-spacing: 2px; text-transform: uppercase; margin-top: 4px; color: var(--text-secondary); min-height: 12px; }
    .match-indicator { font-size: 8px; letter-spacing: 2px; text-transform: uppercase; margin-top: 4px; min-height: 12px; }

    /* Token-expired overlay */
    #expiredOverlay {
      display: none; position: absolute; inset: 0;
      background: rgba(11,13,23,0.95); z-index: 10;
      align-items: center; justify-content: center; flex-direction: column;
      text-align: center; padding: 2rem;
    }
    #expiredOverlay.show { display: flex; }
  </style>
</head>
<body>

  <video class="bg-video" autoplay loop muted playsinline>
    <source src="https://res.cloudinary.com/dmqwjpmjk/video/upload/v1761507594/portal-bg_oribvr.mp4" type="video/mp4">
  </video>
  <div class="video-overlay"></div>

  <div class="auth-card">
    <!-- Token-expired overlay (shown if link is stale) -->
    <div id="expiredOverlay">
      <div style="font-size: 2rem; margin-bottom: 1rem; color: var(--accent-red);">⊘</div>
      <p style="font-family:'Teko',sans-serif; font-size: 1.6rem; letter-spacing: 2px; text-transform: uppercase; color: var(--text-primary); margin-bottom: 0.5rem;">Transmission Decayed</p>
      <p style="font-size: 10px; color: var(--text-secondary); letter-spacing: 1px; margin-bottom: 2rem;">This reset link has expired or is invalid.<br>Request a new one from the login page.</p>
      <a href="login.html" style="padding: 0.8rem 2rem; background: var(--accent-gold); color: var(--bg-primary); font-family:'JetBrains Mono',monospace; font-size: 10px; letter-spacing: 3px; text-transform: uppercase; text-decoration: none;">Return to Login</a>
    </div>

    <h1 class="auth-title">Forge Key</h1>
    <p class="auth-subtitle">Establish a new security sequence</p>

    <form id="resetForm" onsubmit="event.preventDefault();">
      <div class="input-group">
        <label class="input-label" for="newPassword">New Passkey</label>
        <div class="password-wrap">
          <input type="password" id="newPassword" class="auth-input" required autocomplete="new-password">
          <button type="button" class="toggle-pw" id="toggleNew" tabindex="-1">show</button>
        </div>
        <div class="strength-bar-wrap"><div class="strength-bar" id="strengthBar"></div></div>
        <div class="strength-label" id="strengthLabel"></div>
      </div>
      
      <div class="input-group">
        <label class="input-label" for="confirmPassword">Confirm Passkey</label>
        <div class="password-wrap">
          <input type="password" id="confirmPassword" class="auth-input" required autocomplete="new-password">
          <button type="button" class="toggle-pw" id="toggleConfirm" tabindex="-1">show</button>
        </div>
        <div class="match-indicator" id="matchIndicator"></div>
      </div>

      <button type="submit" class="submit-btn">Commit to Vault</button>
    </form>
  </div>

 <script>
    lucide.createIcons();

    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token');

    // Validate token exists and hasn't obviously expired (basic JWT exp check client-side)
    function isTokenLikelyExpired(t) {
      try {
        const payload = JSON.parse(atob(t.split('.')[1]));
        return payload.exp && (payload.exp * 1000 < Date.now());
      } catch { return false; }
    }

    if (!token || isTokenLikelyExpired(token)) {
      document.getElementById('expiredOverlay').classList.add('show');
    }

    const form          = document.getElementById('resetForm');
    const submitBtn     = document.querySelector('.submit-btn');
    const newPwInput    = document.getElementById('newPassword');
    const confirmInput  = document.getElementById('confirmPassword');
    const strengthBar   = document.getElementById('strengthBar');
    const strengthLabel = document.getElementById('strengthLabel');
    const matchIndicator = document.getElementById('matchIndicator');

    // --- SHOW / HIDE TOGGLES ---
    document.getElementById('toggleNew').addEventListener('click', () => {
      const hidden = newPwInput.type === 'password';
      newPwInput.type = hidden ? 'text' : 'password';
      document.getElementById('toggleNew').textContent = hidden ? 'hide' : 'show';
    });
    document.getElementById('toggleConfirm').addEventListener('click', () => {
      const hidden = confirmInput.type === 'password';
      confirmInput.type = hidden ? 'text' : 'password';
      document.getElementById('toggleConfirm').textContent = hidden ? 'hide' : 'show';
    });

    // --- STRENGTH METER ---
    function getStrength(pw) {
      let s = 0;
      if (pw.length >= 8) s++;
      if (pw.length >= 12) s++;
      if (/[A-Z]/.test(pw)) s++;
      if (/[0-9]/.test(pw)) s++;
      if (/[^A-Za-z0-9]/.test(pw)) s++;
      return s;
    }
    const levels = [
      { label: '',              color: 'transparent',         pct: '0%'   },
      { label: 'WEAK',          color: 'var(--accent-red)',   pct: '20%'  },
      { label: 'WEAK',          color: 'var(--accent-red)',   pct: '35%'  },
      { label: 'MODERATE',      color: 'var(--accent-gold)',  pct: '60%'  },
      { label: 'STRONG',        color: 'var(--accent-green)', pct: '80%'  },
      { label: 'UNBREACHABLE',  color: 'var(--accent-green)', pct: '100%' },
    ];
    newPwInput.addEventListener('input', () => {
      const pw = newPwInput.value;
      const score = pw.length === 0 ? 0 : Math.max(1, getStrength(pw));
      const lv = levels[score];
      strengthBar.style.width = lv.pct;
      strengthBar.style.background = lv.color;
      strengthLabel.textContent = lv.label;
      strengthLabel.style.color = lv.color;
      checkMatch();
    });

    function checkMatch() {
      const cf = confirmInput.value;
      if (!cf) { matchIndicator.textContent = ''; return; }
      if (newPwInput.value === cf) {
        matchIndicator.textContent = '✓ Sequences Match';
        matchIndicator.style.color = 'var(--accent-green)';
      } else {
        matchIndicator.textContent = '✗ Mismatch Detected';
        matchIndicator.style.color = 'var(--accent-red)';
      }
    }
    confirmInput.addEventListener('input', checkMatch);

    // --- SUBMIT ---
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const newPassword     = newPwInput.value;
      const confirmPassword = confirmInput.value;

      if (newPassword.length < 8) {
        matchIndicator.textContent = '✗ Passkey must be at least 8 characters.';
        matchIndicator.style.color = 'var(--accent-red)';
        return;
      }
      if (newPassword !== confirmPassword) {
        matchIndicator.textContent = '✗ Sequences must be identical.';
        matchIndicator.style.color = 'var(--accent-red)';
        confirmInput.focus();
        return;
      }

      submitBtn.textContent = "Forging Key...";
      submitBtn.disabled = true;

      try {
        const response = await fetch('https://alfaaz-project.onrender.com/auth/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token: token, new_password: newPassword })
        });
        const data = await response.json();

        if (response.ok) {
          submitBtn.textContent = "Key Forged";
          submitBtn.style.background = "var(--accent-gold)";
          submitBtn.style.borderColor = "var(--accent-gold)";
          submitBtn.style.color = "var(--bg-primary)";
          setTimeout(() => { window.location.href = 'login.html'; }, 1500);
        } else if (response.status === 401) {
          // Token expired on server side — show the overlay
          document.getElementById('expiredOverlay').classList.add('show');
        } else {
          submitBtn.textContent = "Commit to Vault";
          submitBtn.disabled = false;
          alert("Error: " + (data.detail || "Unknown error."));
        }
      } catch (error) {
        submitBtn.textContent = "Commit to Vault";
        submitBtn.disabled = false;
        alert("Cannot reach the server. Is your Python engine running?");
      }
    });
  </script>
</body>
</html>
