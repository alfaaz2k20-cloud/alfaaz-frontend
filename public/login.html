<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — ALFAAZ Collective</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500&family=Teko:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    /* Pulling in your core variables */
    :root {
      --bg-primary: #0b0d17;
      --bg-secondary: #151925;
      --text-primary: #e6eef6;
      --text-secondary: #a0aec0;
      --accent-gold: #f8d37f;
      --grid-border: rgba(230, 238, 246, 0.1);
      --accent-red: #ff5555;
      --accent-green: #4ade80;
      --transition-smooth: cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    body {
      margin: 0;
      background-color: var(--bg-primary);
      color: var(--text-primary);
      font-family: 'JetBrains Mono', monospace;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Background Setup */
    .bg-video {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      object-fit: cover; z-index: -2;
      filter: brightness(0.3) blur(4px);
    }
    .video-overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(11, 13, 23, 0.8); z-index: -1;
    }

    /* Back Button */
    .back-btn {
      position: fixed;
      top: 2rem; left: 2rem;
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      transition: color 0.3s ease;
    }
    .back-btn:hover { color: var(--accent-gold); }

    /* Login Card - Brutalist Window */
    .auth-card {
      width: 100%;
      max-width: 400px;
      background: var(--bg-secondary);
      border: 1px solid var(--grid-border);
      padding: 3rem 2.5rem;
      position: relative;
    }

    /* The glowing top edge */
    .auth-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; width: 100%; height: 2px;
      background: var(--accent-gold);
    }

    .auth-title {
      font-family: 'Teko', sans-serif;
      font-size: 2.5rem;
      font-weight: 400;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 0.5rem;
      text-align: center;
    }

    .auth-subtitle {
      font-size: 10px;
      color: var(--text-secondary);
      letter-spacing: 1px;
      text-align: center;
      margin-bottom: 2.5rem;
      text-transform: uppercase;
    }

    /* Form Elements */
    .input-group {
      margin-bottom: 1.5rem;
    }

    .input-label {
      display: block;
      font-size: 9px;
      letter-spacing: 2px;
      color: var(--text-secondary);
      margin-bottom: 0.5rem;
      text-transform: uppercase;
    }

    .auth-input {
      width: 100%;
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--grid-border);
      color: var(--text-primary);
      font-family: 'JetBrains Mono', monospace;
      font-size: 14px;
      padding: 0.5rem 0;
      transition: border-color 0.3s ease;
    }

    .auth-input:focus {
      outline: none;
      border-bottom-color: var(--accent-gold);
    }

    .submit-btn {
      width: 100%;
      margin-top: 1rem;
      padding: 1rem;
      background: var(--text-primary);
      color: var(--bg-primary);
      border: 1px solid var(--text-primary);
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.3s var(--transition-smooth);
    }

    .submit-btn:hover {
      background: var(--accent-gold);
      border-color: var(--accent-gold);
    }

    .toggle-auth {
      margin-top: 1.5rem;
      text-align: center;
      font-size: 9px;
      color: var(--text-secondary);
      letter-spacing: 1px;
    }
    
    /* UPDATED: Target the anchor link instead of button */
    .toggle-auth a {
      color: var(--text-primary);
      text-decoration: underline;
      margin-left: 0.5rem;
      transition: color 0.3s ease;
    }
    .toggle-auth a:hover { color: var(--accent-gold); }

    /* Recovery Link */
    .recovery-link {
      display: block;
      text-align: right;
      font-size: 9px;
      color: var(--text-secondary);
      letter-spacing: 1px;
      text-transform: uppercase;
      text-decoration: none;
      margin-top: -0.5rem;
      margin-bottom: 1.5rem;
      transition: color 0.3s ease;
    }
    .recovery-link:hover { color: var(--accent-gold); }

    /* Password field wrapper for show/hide toggle */
    .password-wrap {
      position: relative;
    }
    .password-wrap .auth-input {
      padding-right: 2rem;
    }
    .toggle-pw {
      position: absolute;
      right: 0;
      bottom: 0.5rem;
      background: none;
      border: none;
      color: var(--text-secondary);
      cursor: pointer;
      font-size: 9px;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 0;
      transition: color 0.3s ease;
    }
    .toggle-pw:hover { color: var(--accent-gold); }

    /* Forgot hint */
    .forgot-hint {
      font-size: 8px;
      color: var(--text-secondary);
      letter-spacing: 1px;
      margin-top: 4px;
      opacity: 0;
      transform: translateY(-4px);
      transition: opacity 0.3s ease, transform 0.3s ease;
    }
    .forgot-hint.visible {
      opacity: 1;
      transform: translateY(0);
    }
  </style>
</head>
<body>

  <video class="bg-video" autoplay loop muted playsinline>
    <source src="https://res.cloudinary.com/dmqwjpmjk/video/upload/v1761507594/portal-bg_oribvr.mp4" type="video/mp4">
  </video>
  <div class="video-overlay"></div>

  <a href="index.html" class="back-btn">
    <i data-lucide="arrow-left" class="w-4 h-4"></i> Return
  </a>

  <div class="auth-card">
    <h1 class="auth-title">Identify</h1>
    <p class="auth-subtitle">Enter your credentials</p>

    <form id="authForm" onsubmit="event.preventDefault();">
      <div class="input-group">
        <label class="input-label" for="email">Email Sequence</label>
        <input type="email" id="email" class="auth-input" required autocomplete="email" spellcheck="false">
      </div>
      
      <div class="input-group">
        <label class="input-label" for="password">Passkey</label>
        <div class="password-wrap">
          <input type="password" id="password" class="auth-input" required autocomplete="current-password">
          <button type="button" class="toggle-pw" id="togglePw" tabindex="-1">show</button>
        </div>
      </div>

      <a href="#" id="forgotBtn" class="recovery-link">Lost Passkey?</a>
      <div class="forgot-hint" id="forgotHint">↑ Enter your email above, then click "Lost Passkey?"</div>

      <button type="submit" class="submit-btn">Initialize Session</button>
    </form>

    <div class="toggle-auth">
      New to the collective? <a href="register.html">Request Access</a>
    </div>
  </div>

 <script>
    lucide.createIcons();

    const form       = document.getElementById('authForm');
    const submitBtn  = document.querySelector('.submit-btn');
    const forgotBtn  = document.getElementById('forgotBtn');
    const emailInput = document.getElementById('email');
    const pwInput    = document.getElementById('password');
    const togglePw   = document.getElementById('togglePw');
    const forgotHint = document.getElementById('forgotHint');

    // --- SHOW / HIDE PASSKEY ---
    togglePw.addEventListener('click', () => {
      const hidden = pwInput.type === 'password';
      pwInput.type = hidden ? 'text' : 'password';
      togglePw.textContent = hidden ? 'hide' : 'show';
    });

    // --- FORGOT HINT: reveal when email is empty and link is hovered ---
    forgotBtn.addEventListener('mouseenter', () => {
      if (!emailInput.value.trim()) forgotHint.classList.add('visible');
    });
    forgotBtn.addEventListener('mouseleave', () => {
      forgotHint.classList.remove('visible');
    });

    // --- LOGIN ---
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const emailValue    = emailInput.value.trim();
      const passwordValue = pwInput.value;
      submitBtn.textContent = "Connecting...";
      submitBtn.disabled = true;
      try {
        const response = await fetch('https://alfaaz-project.onrender.com/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: emailValue, password: passwordValue })
        });
        const data = await response.json();
        if (response.ok) {
          submitBtn.textContent = "Access Granted";
          submitBtn.style.background = "var(--accent-gold)";
          submitBtn.style.color = "var(--bg-primary)";
          localStorage.setItem('alfaaz_user', JSON.stringify(data.user));
          localStorage.setItem('alfaaz_token', data.token);
          setTimeout(() => {
            window.location.href = data.user.status === 'ADMIN' ? 'admin.html' : 'dashboard.html';
          }, 800);
        } else {
          submitBtn.textContent = "Initialize Session";
          submitBtn.disabled = false;
          // Flash the card border red briefly
          const card = document.querySelector('.auth-card');
          card.style.borderColor = 'var(--accent-red)';
          setTimeout(() => card.style.borderColor = '', 1200);
          alert("Access Denied: " + (data.detail || "Invalid credentials."));
        }
      } catch (error) {
        submitBtn.textContent = "Initialize Session";
        submitBtn.disabled = false;
        alert("Cannot reach the server. Is your Python engine running?");
      }
    });

    // --- FORGOT PASSWORD ---
    forgotBtn.addEventListener('click', async (e) => {
      e.preventDefault();
      const emailValue = emailInput.value.trim();
      if (!emailValue) {
        forgotHint.classList.add('visible');
        emailInput.focus();
        setTimeout(() => forgotHint.classList.remove('visible'), 3000);
        return;
      }
      const original = submitBtn.textContent;
      submitBtn.textContent = "Transmitting Request...";
      submitBtn.disabled = true;
      try {
        const response = await fetch('https://alfaaz-project.onrender.com/auth/forgot-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: emailValue })
        });
        const data = await response.json();
        if (response.ok) {
          alert(data.message);
        } else {
          alert("Transmission failed: " + (data.detail || "Unknown error."));
        }
      } catch (error) {
        alert("Signal lost. Cannot reach the server.");
      } finally {
        submitBtn.textContent = original;
        submitBtn.disabled = false;
      }
    });
  </script>
  <script src="api.js"></script>
</body>
</html>
