<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Submit to Storage — ALFAAZ</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="global.css">
  <style>
    .vault-container { max-width: 600px; margin: 8rem auto; padding: 0 2rem; }
    .panel-title { font-family: var(--font-heading); font-size: 2.5rem; font-weight: 400; letter-spacing: 1px; margin-bottom: 0.5rem; color: var(--text-primary); text-align: center;}
    .panel-subtitle { font-size: 11px; color: var(--text-secondary); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 2.5rem; text-align: center; }
    .input-group { margin-bottom: 2rem; }
    .auth-input, select, textarea { width: 100%; background: transparent; border: none; border-bottom: 1px solid var(--grid-border); color: var(--text-primary); font-family: var(--font-body); font-size: 13px; padding: 0.8rem 0; transition: border-color 0.3s ease; border-radius: 0; }
    .auth-input:focus, select:focus, textarea:focus { outline: none; border-bottom-color: var(--accent-gold); }
    input[type="file"] { font-size: 11px; color: var(--text-secondary); padding: 0.5rem 0; width: 100%; }
    input[type="file"]::file-selector-button { background: var(--bg-primary); color: var(--text-primary); border: 1px solid var(--grid-border); padding: 0.8rem 1.5rem; margin-right: 1rem; font-family: var(--font-body); font-size: 10px; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; transition: 0.3s; border-radius: 0; }
    input[type="file"]::file-selector-button:hover { background: var(--text-primary); color: #fff; }
    #status-msg { margin-top: 15px; font-size: 11px; text-align: center; letter-spacing: 1px; text-transform: uppercase; }
    
    .nav-links { display: flex; align-items: center; gap: 2.5rem; }
    .nav-links a { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--text-secondary); text-decoration: none; position: relative; padding: 0.5rem 0; transition: color 0.3s ease; }
    .nav-links a::after { content: ''; position: absolute; bottom: 0; left: 0; width: 0; height: 1px; background: var(--accent-gold); transition: width 0.4s ease; }
    .nav-links a:hover::after { width: 100%; }
    .nav-links a:hover { color: var(--accent-gold); }
    .nav-actions { display: flex; align-items: center; gap: 1.5rem; }
    .mobile-only-link { display: none; }
    #menuToggle { display: none; cursor: none; color: var(--text-primary); background: none; border: none; z-index: 1001; }
    #menuToggle .hamburger-close { display: none; }
    #menuToggle.active .hamburger-open { display: none; }
    #menuToggle.active .hamburger-close { display: block; }
    @media (max-width: 768px) { nav { padding: 1rem 1.5rem; } .nav-login { display: none !important; } .mobile-only-link { display: block; } .nav-links { display: none; position: absolute; top: 100%; left: 0; width: 100%; flex-direction: column; background: var(--bg-secondary); padding: 2rem; gap: 1.5rem; border-bottom: 1px solid var(--grid-border); box-shadow: 0 10px 20px rgba(0,0,0,0.05); } .nav-links.active { display: flex; } #menuToggle { display: flex; align-items: center; justify-content: center; margin-left: 0.5rem; } }
  </style>
</head>
<body>
  <div class="custom-cursor" id="cursor"></div>

  <nav id="navbar">
    <a href="index.html" class="logo magnetic">ALFAAZ</a>
    <div class="nav-links" id="navLinks">
      <a href="index.html#home" class="magnetic">Home</a>
      <a href="index.html#updates" class="magnetic">Exhibitions</a>
      <a href="index.html#about" class="magnetic">About</a>
      <a href="index.html#journey" class="magnetic">Gallery</a>
      <a href="index.html#clubs" class="magnetic">Clubs</a>
      <a href="blogs.html" class="magnetic">Journal</a>
      <a id="mobileLoginBtn" href="login.html" class="mobile-only-link magnetic">Login / Register</a>
    </div>
    <div class="nav-actions">
      <a id="tchLinkNav" href="https://tchandervar.neocities.org" target="_blank" rel="noopener noreferrer" class="cta-btn magnetic" style="padding: 0.6rem 1.2rem; font-size: 10px;">Tchandervar</a>
      <a href="dashboard.html" class="action-btn gold magnetic" style="padding: 0.6rem 1.2rem; font-size: 10px; border:none;">Dashboard</a>
      <button id="menuToggle" aria-label="Toggle menu" aria-expanded="false"><i data-lucide="menu" class="w-6 h-6 hamburger-open"></i><i data-lucide="x" class="w-6 h-6 hamburger-close"></i></button>
    </div>
  </nav>

  <div class="vault-container">
    <div class="panel">
      <h1 class="panel-title">The Storage</h1>
      <p class="panel-subtitle">Submit your files securely to the Curator</p>
      
      <form id="submission-form">
        <div class="input-group">
          <label class="input-label">Submission Type</label>
          <select id="sub-type">
              <option value="Art Portfolio (PDF/IMG)">Art Portfolio (PDF/IMG)</option>
              <option value="Project Proposal">Project Proposal</option>
              <option value="Membership Form">Membership Form</option>
          </select>
        </div>
        <div class="input-group">
          <label class="input-label">Title / Designation</label>
          <input type="text" id="title" class="auth-input" required placeholder="e.g., The Autumn Collection">
        </div>
        <div class="input-group">
          <label class="input-label">File (PDF or Image)</label>
          <input type="file" id="file-upload" required>
        </div>
        <div class="input-group">
          <label class="input-label">Curator's Note (Optional context)</label>
          <textarea id="note" rows="3" placeholder="Brief context..."></textarea>
        </div>
        <button type="submit" id="submit-btn" class="submit-btn magnetic" style="width: 100%;">Submit to Storage</button>
      </form>
      <div id="status-msg"></div>
    </div>
  </div>

  <script src="global.js"></script>
  <script>
    const userData = localStorage.getItem('alfaaz_user'), token = localStorage.getItem('alfaaz_token');
    if (!userData || !token) window.location.href = 'login.html';
    const user = JSON.parse(userData); 
    const menuToggle = document.getElementById('menuToggle'), navLinks = document.getElementById('navLinks');
    menuToggle?.addEventListener('click', () => { const isExpanded = menuToggle.getAttribute('aria-expanded') === 'true'; menuToggle.setAttribute('aria-expanded', !isExpanded); menuToggle.classList.toggle('active'); navLinks.classList.toggle('active'); });

    const CLOUD_NAME = "dmqwjpmjk", UPLOAD_PRESET = "alfaaz_vault"; 

    document.getElementById('submission-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('submit-btn'), status = document.getElementById('status-msg'), fileInput = document.getElementById('file-upload');
        btn.innerText = "Uploading..."; btn.disabled = true; status.style.color = "var(--text-secondary)"; status.innerText = "Uploading your file to secure storage...";

        try {
            const formData = new FormData(); formData.append('file', fileInput.files[0]); formData.append('upload_preset', UPLOAD_PRESET);
            const cloudRes = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/upload`, { method: 'POST', body: formData });
            const cloudData = await cloudRes.json();
            if (!cloudData.secure_url) throw new Error("Failed to secure file link.");

            btn.innerText = "Finalizing..."; status.innerText = "Notifying the Curator...";
            const vaultData = { submission_type: document.getElementById('sub-type').value, title: document.getElementById('title').value, file_url: cloudData.secure_url, note: document.getElementById('note').value, author_email: user.email };
            
            const pyRes = await window.globalApiFetch('/vault/submit', { method: 'POST', body: JSON.stringify(vaultData) });

            if (pyRes && pyRes.ok) {
                status.style.color = "var(--accent-green)"; status.innerText = "Submission Successful";
                btn.style.background = "var(--accent-gold)"; btn.style.borderColor = "var(--accent-gold)"; btn.innerText = "File Secured";
                setTimeout(() => { window.location.href = 'dashboard.html'; }, 2000);
            } else {
                throw new Error("The Storage system rejected the submission.");
            }
        } catch (error) {
            status.style.color = "var(--accent-red)"; status.innerText = "ERROR: " + error.message; btn.innerText = "Submit to Storage"; btn.disabled = false;
        }
    });
  </script>
</body>
</html>
